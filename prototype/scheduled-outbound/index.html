  {id:3,industryId:'equipment_rental',notifTitle:'Rental renewal: Luis M.',contact:'Luis M.',rel:'Client',type:'renewal',summary:'Two scissor lifts rental ends in 2 days: confirm extension or schedule pickup.',callDraft:'Check with Luis — his 2 scissor lifts at 600 B St are up Friday. Does he want to extend or should we schedule pickup?',textDraft:'Hi Luis, this is All Access Equipment. Your 2 scissor lifts at 600 B St are up for return on Friday. Need to extend? Reply EXTEND or we\'ll schedule pickup.',due:'Wed',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Feb 15',summary:'Inquired about scissor lift availability for a commercial project at 600 B St.'},{type:'sms',direction:'out',time:'Feb 16',text:'Quote sent: 2x 19ft scissor lifts, $450/week each. Delivery included.'},{type:'call',direction:'in',time:'Feb 20',summary:'Confirmed the quote. Wants delivery March 3rd, morning slot.'},{type:'sms',direction:'out',time:'Mar 2',text:'Delivery confirmed for tomorrow 8am. Operator manual attached.'}],serviceEvent:{title:'2x scissor lifts rental started on Mar 3, 30-day term',scheduled:'Scheduled for Apr 2: renewal reminder',date:'Mar 3'},recentItems:[{type:'call',direction:'in',time:'Mar 15',summary:'Operator asked about load capacity for the 19ft model. Confirmed 500lb platform capacity.'},{type:'call',direction:'in',time:'Mar 28',summary:'Reported a flat tire on one lift. Dispatched technician for same-day repair.'}]},
  // ── Check-ins ──
  {id:4,industryId:'pharmacy',notifTitle:'Rx delivery check-in: Carlos R.',contact:'Carlos R.',rel:'Patient',type:'check-in',summary:'Ozempic delivered yesterday: check if delivery arrived safely and answer any questions.',callDraft:'Authenticate (DoB) & check in with Carlos — his Ozempic was delivered yesterday to his Miami address. Ask if it arrived safely and if he has any questions about the medication.',textDraft:'Hi Carlos, this is Safer Pharmacy. Just checking in — did your delivery arrive safely? Any questions? Can you call us back on this number please?',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 20',summary:'New patient intake. Transferring from Walgreens — Ozempic 1mg prescribed by Dr. Lopez.'},{type:'call',direction:'in',time:'Mar 22',summary:'Called to confirm Miami delivery address and insurance info. Blue Cross on file.'},{type:'sms',direction:'out',time:'Mar 28',text:'Your prescription is being processed. Estimated delivery: March 30.'},{type:'call',direction:'in',time:'Mar 29',summary:'Asked about Ozempic storage requirements. Advised refrigeration before first use.'}],serviceEvent:{title:'Ozempic 1mg delivered on Mar 30, first delivery',scheduled:'Scheduled for Mar 31: day-1 delivery check-in',date:'Mar 30'}},
  {id:5,industryId:'oncology',notifTitle:'Treatment check-in: James W.',contact:'James W.',rel:'Patient',type:'check-in',summary:'48h post immunotherapy cycle 3: check in on side effects and recovery.',callDraft:'Authenticate (DoB) & check in on James 48h after immunotherapy cycle 3. Ask about nausea, fatigue, appetite, rash, diarrhea frequency, dyspnea, visual changes, and liver symptoms (CTCAE criteria). If concerning, offer to move up his next visit.',textDraft:'Hi James, this is Dr. Ali\'s office. We hope you\'re recovering well and would like to check in. Can you call us back on this number please?',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Jan 15',summary:'Initial consultation with Dr. Ali. Discussed treatment plan for stage II lymphoma.'},{type:'call',direction:'in',time:'Feb 3',summary:'Completed immunotherapy cycle 1. Tolerated well, mild headache.'},{type:'call',direction:'out',time:'Feb 5',summary:'AI check-in: Asked about headache and hydration after cycle 1. James feeling better.'},{type:'call',direction:'in',time:'Mar 1',summary:'Completed cycle 2. Some nausea but manageable with prescribed anti-emetics.'},{type:'call',direction:'in',time:'Mar 25',summary:'Pre-cycle 3 bloodwork reviewed. White cell count adequate, cleared to proceed.'}],serviceEvent:{title:'Immunotherapy cycle 3 completed on Mar 29',scheduled:'Scheduled for Mar 31: 48h post-treatment check-in',date:'Mar 29'}},
  {id:6,industryId:'equipment_rental',notifTitle:'Equipment check-in: Dave T.',contact:'Dave T.',rel:'Client',type:'check-in',summary:'40-ft boom delivered yesterday: check if setup went smoothly and operator has what they need.',callDraft:'Check in with Dave — the 40-ft boom was delivered yesterday for his Monday job. Make sure it\'s set up OK and the operator has what they need.',textDraft:'Hi Dave, John from All Access. Just checking in — is the boom set up and running OK on-site? Let us know if you need anything.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 20',summary:'First-time caller. Needs a 40-ft boom for exterior painting job starting Monday.'},{type:'sms',direction:'out',time:'Mar 21',text:'Quote sent: 40-ft boom lift, $650/week. Delivery + harnesses included.'},{type:'call',direction:'in',time:'Mar 25',summary:'Confirmed the rental. Delivery address: 742 Pine St. Needs it there by 7am Monday.'},{type:'call',direction:'in',time:'Mar 28',summary:'Asked about safety harness requirements. Confirmed we include harnesses with all boom rentals.'}],serviceEvent:{title:'40-ft boom delivered on-site on Mar 31',scheduled:'Scheduled for Apr 1: day-1 equipment check-in',date:'Mar 31'}},
  // ── Ahava Medical scenarios ──
  {id:7,industryId:'primary_care',notifTitle:'Wellness check-in: David R.',contact:'David R.',rel:'Patient',type:'check-in',summary:'Last visit >90 days ago, no communication in 30+ days: preventive care check-in.',callDraft:'Authenticate (DoB) & check in with David. Last visit was Nov 12 with Dr. Hoch — elevated A1C (6.1), elevated BP. Ask how lifestyle modifications are going, any concerns. Offer to schedule a follow-up.',textDraft:'Hi David, this is Dr. Hoch\'s office with Ahava Medical. It\'s been a while since your last visit (Nov 12). We\'d love to check in — can you call us back on this number please?',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Nov 12',summary:'Routine annual physical with Dr. Hoch. Elevated A1C (6.1, prediabetic range), elevated BP 142/88, BMI 33. Discussed lifestyle modifications. Patient expressed frustration with prior diet attempts.'},{type:'call',direction:'in',time:'Nov 18',summary:'Patient called to ask about lab results, spoke with front desk, told normal range, doctor will discuss at next visit.'}],serviceEvent:{title:'Last visit Nov 12, 2025 with Dr. Hoch — A1C 6.1, BP 142/88',scheduled:'Scheduled for Feb 10: wellness check-in (>90 days, no communication in 30+)',date:'Nov 12'}},
  {id:9,industryId:'primary_care',notifTitle:'Wellness check-in: Rachel K.',contact:'Rachel K.',rel:'Patient',type:'check-in',summary:'Last visit 60 days ago, mentioned wanting to get healthier: preventive care check-in.',callDraft:'Authenticate (DoB) & check in with Rachel. Last visit was Feb 3 with Dr. Fakheri — mild hypertension 138/86, BMI 31, stress and sleep issues, prescribed melatonin. She mentioned wanting to get healthier for her kids. Ask how the melatonin is working, how she\'s feeling. Offer to schedule a wellness visit.',textDraft:'Hi Rachel, this is Dr. Fakheri\'s office with Ahava Medical. It\'s been a while since your last visit (Feb 3). We\'d love to check in — can you call us back on this number please?',due:'May 4',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Jan 15',summary:'Well-child visit for her son (age 8) with Dr. Kabariti. Child healthy, routine vaccines administered.'},{type:'call',direction:'in',time:'Feb 3',summary:'Rachel\'s own visit with Dr. Fakheri. Routine check-up — BMI 31, mild hypertension (138/86), discussed stress and sleep issues, prescribed melatonin. Patient mentioned wanting to get healthier for her kids.'}],serviceEvent:{title:'Last visit Feb 3, 2026 with Dr. Fakheri — BMI 31, mild hypertension',scheduled:'Scheduled for May 4: wellness check-in (90 days, patient expressed health goals)',date:'Feb 3'}},
  {id:10,industryId:'primary_care',notifTitle:'Rx renewal + visit: James T.',contact:'James T.',rel:'Patient',type:'renewal',summary:'Rx renewal overdue and lab follow-up needed: refill reminder + wellness check-in.',callDraft:'Authenticate (DoB) & call James about his overdue prescription renewal — Metformin 1000mg and Amlodipine 5mg were due for refill in Feb. Also, his last visit was Aug 20 with Dr. Hoch, A1C was 7.2 and lab recheck was recommended at 6 months. Ask if he\'d like to schedule both a refill and a follow-up visit.',textDraft:'Hi James, this is Dr. Hoch\'s office with Ahava Medical. You have a prescription renewal coming due and we\'d like to schedule a follow-up. Can you call us back on this number please?',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Aug 20',summary:'Routine visit with Dr. Hoch. Type 2 diabetes (managed, A1C 7.2), hypertension, BMI 36. On Metformin 1000mg and Amlodipine 5mg. Discussed adding to regimen, patient declined at the time.'},{type:'sms',direction:'out',time:'Feb 10',text:'Rx renewal reminder. No response.'}],serviceEvent:{title:'Rx refill overdue since Feb 2026 — Metformin 1000mg, Amlodipine 5mg',scheduled:'Scheduled for Apr 1: Rx renewal reminder + wellness check-in (>180 days, lab follow-up needed)',date:'Feb 10'}},
  // ── Residential agent scenarios (Acme Realty) ──
  {id:12,industryId:'residential',notifTitle:'Homeiversary: Jennifer L.',contact:'Jennifer L.',rel:'Buyer',type:'renewal',summary:'1-year homeiversary: comps show ~14% appreciation since close — offer fresh equity update.',callDraft:'Call Jennifer for her 1-year homeiversary at 412 Elm. Comps show ~14% appreciation since close. Offer a fresh equity / market analysis and ask if she has friends thinking of buying or selling.',textDraft:'Hi Jennifer, James from Acme Realty. Happy 1-year at 412 Elm! Homes in your area are selling strong — happy to send you a fresh equity update if useful. Reply GO and I\'ll put it together.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Feb 18, 2025',summary:'First call: looking for a 3BR in East Austin, budget up to $625k, hoping to close by April.'},{type:'sms',direction:'out',time:'Feb 22, 2025',text:'Sending you 4 listings to walk through this weekend — 412 Elm is the standout for budget + commute.'},{type:'call',direction:'in',time:'Mar 14, 2025',summary:'Walked 412 Elm. Loved the kitchen, wants to put in an offer at $615k.'},{type:'sms',direction:'out',time:'Apr 28, 2025',text:'Closing day! 412 Elm is officially yours 🎉'}],serviceEvent:{title:'412 Elm closed Apr 28, 2025 — $615,000',scheduled:'Scheduled for Apr 28: 12-month homeiversary equity check-in',date:'Apr 28, 2025'}},
  // ── Gastroenterology scenarios (Metro GI) ──
  {id:14,industryId:'gastroenterology',notifTitle:'Pre-op confirmation: Patricia M.',contact:'Patricia M.',rel:'Patient',type:'check-in',summary:'Colonoscopy in 48h: confirm bowel prep started, anticoagulant hold, NPO, transport escort.',callDraft:'Authenticate (DoB) & confirm Patricia is set for her screening colonoscopy on Apr 30 at GI Lab Room 2. Verify she started bowel prep tonight, held her warfarin per Dr. Chen\'s instructions on Apr 23, NPO after midnight, and has a transport escort confirmed. Flag any issues to Dr. Chen.',textDraft:'Hi Patricia, this is Dr. Chen\'s office. Your colonoscopy is in 48h. Quick confirm: bowel prep tonight, NPO after midnight, warfarin held since Apr 23, escort confirmed. Reply YES if all set or call us if any questions.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 4',summary:'Referral from PCP — screening colonoscopy at age 50. Family history of colon cancer (mother).'},{type:'call',direction:'in',time:'Mar 18',summary:'Pre-procedure consult with Dr. Chen. Discussed prep, anticoagulation hold, transport escort. Booked for Apr 30, 9am.'},{type:'sms',direction:'out',time:'Apr 23',text:'Reminder: stop warfarin today (Apr 23) per Dr. Chen. Continue your other meds.'}],serviceEvent:{title:'Screening colonoscopy on Apr 30 with Dr. Chen (GI Lab Room 2)',scheduled:'Scheduled for Apr 28: 48h pre-op confirmation',date:'Apr 30'}},
  {id:15,industryId:'gastroenterology',notifTitle:'Open slot: Thomas G.',contact:'Thomas G.',rel:'Patient',type:'follow-up',summary:'Cancellation backfill: surveillance colonoscopy slot opened in 48h — text waitlist priority #1.',callDraft:'Per clinician-assigned waitlist priority, offer Thomas the 9am slot on Apr 30 (cancellation). He\'s overdue for surveillance after polypectomy 3 years ago. First YES is handed off to staff for confirmation — no AI auto-booking.',textDraft:'Hi Thomas, this is Dr. Chen\'s office. A surveillance colonoscopy slot just opened: Apr 30 at 9am. Want it? Reply YES and we\'ll call you to confirm. (Reply NO and we\'ll keep you on the list.)',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 14, 2023',summary:'Surveillance colonoscopy with Dr. Chen — 2 tubular adenomas removed, recommended 3-year follow-up.'},{type:'sms',direction:'out',time:'Mar 1',text:'Surveillance colonoscopy due. Reply BOOK to schedule. We\'ll add you to the waitlist for earlier slots.'},{type:'sms',direction:'in',time:'Mar 1',text:'Yes book me, but wait list me for anything sooner.'}],serviceEvent:{title:'Open slot: Apr 30, 9am at GI Lab Room 1 (cancellation backfill)',scheduled:'Scheduled for Apr 28: waitlist offer (clinician-priority order)',date:'Apr 28'}},
  // ── Dental (Lakeside Dental) ──
  {id:16,industryId:'dental',notifTitle:'6-month cleaning: Emma R.',contact:'Emma R.',rel:'Patient',type:'renewal',summary:'6 months since last cleaning: text reminder and offer next available slot.',callDraft:'Call Emma to schedule her routine 6-month cleaning. Offer Tue 10am or Thu 2pm. Confirm her current insurance is still Delta Dental PPO.',textDraft:'Hi Emma, this is Lakeside Dental. It\'s been 6 months since your last cleaning — time to schedule! I have Tue at 10am or Thu at 2pm. Reply with what works.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Aug 14',summary:'Routine prophylaxis cleaning + exam with Dr. Martinez. No new caries. Mild gingivitis on lower molars — recommended improved flossing.'},{type:'sms',direction:'out',time:'Aug 16',text:'Thanks for visiting Lakeside Dental! See you in 6 months.'}],serviceEvent:{title:'Last cleaning Aug 14 with Hygienist Sara · Delta Dental PPO on file',scheduled:'Scheduled for Apr 28: 6-month cleaning reminder',date:'Aug 14'}},
  {id:17,industryId:'dental',notifTitle:'Post-crown check-in: Tom B.',contact:'Tom B.',rel:'Patient',type:'check-in',summary:'48h after porcelain crown #14: sensitivity check and bite confirmation.',callDraft:'Authenticate (DoB) & check in on Tom 48h after porcelain crown placement on tooth #14. Ask about hot/cold sensitivity, bite alignment, and any pain on chewing. Reassure mild sensitivity is normal up to 2 weeks. If severe pain or bite feels off, schedule adjustment within the week.',textDraft:'Hi Tom, this is Lakeside Dental. Hope your new crown is settling in well. Any sensitivity or bite issues? Mild sensitivity for a few days is normal. Reply or call us if anything feels off.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 14',summary:'Routine cleaning. Dr. Martinez identified large filling on #14 with crack — recommended porcelain crown.'},{type:'sms',direction:'out',time:'Apr 18',text:'Crown prep + temp scheduled Apr 24, 10am. Final crown seat Apr 28, 9am.'},{type:'call',direction:'in',time:'Apr 24',summary:'Crown prep visit. Temporary crown placed. No issues during procedure.'}],serviceEvent:{title:'Porcelain crown #14 seated Apr 28 with Dr. Martinez',scheduled:'Scheduled for Apr 30: 48h post-procedure check-in',date:'Apr 28'}},
  // ── Mental Health (Lakeside Counseling) ──
  {id:18,industryId:'mental_health',notifTitle:'Between-session check-in: Alex M.',contact:'Alex M.',rel:'Client',type:'check-in',summary:'Bi-weekly client between sessions: brief supportive check-in, no clinical content.',callDraft:'Brief, warm check-in with Alex between sessions. Just ask how the week is going. If they bring up anything clinical, route to Dr. Lee. Do not press on details.',textDraft:'Hi Alex, this is Lakeside Counseling. Just checking in between sessions — how\'s your week going? No need to reply if you\'re busy. We\'re here when you need us.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Feb 4',summary:'Initial intake evaluation with Dr. Lee. Bi-weekly cadence agreed. Anxiety + work stress focus.'},{type:'call',direction:'in',time:'Mar 4',summary:'Session 2. Discussed coping strategies and journaling.'},{type:'call',direction:'in',time:'Apr 1',summary:'Session 3. Reported improvement using grounding exercises.'}],serviceEvent:{title:'Last session Apr 15 with Dr. Lee · Next session Apr 29',scheduled:'Scheduled for Apr 22: between-session check-in (mid-cycle)',date:'Apr 15'}},
  {id:19,industryId:'mental_health',notifTitle:'Re-engagement: Jamie L.',contact:'Jamie L.',rel:'Client',type:'follow-up',summary:'Missed last session 14 days ago: gentle re-engagement, easy rebooking.',callDraft:'Reach out gently to Jamie — they no-showed their session 2 weeks ago and we have not heard back. Acknowledge it can be hard to come back. Offer easy rebooking. Do not press for reasons.',textDraft:'Hi Jamie, this is Lakeside Counseling. Just wanted to let you know we\'re here whenever you\'re ready. Coming back can be hard — no judgment. If you\'d like to reschedule, reply BOOK and I\'ll send a few times that work for you.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Jan 8',summary:'Initial intake with Dr. Lee. Weekly cadence. Depression focus.'},{type:'call',direction:'in',time:'Jan 22',summary:'Session 2. Discussed sleep and routine.'},{type:'call',direction:'in',time:'Feb 5',summary:'Session 3. Some improvement with sleep hygiene.'},{type:'call',direction:'in',time:'Apr 8',summary:'Most recent session. Rough week reported, increased therapist support discussed.'},{type:'sms',direction:'out',time:'Apr 14',text:'Hi Jamie, just confirming your appointment tomorrow at 10am.'},{type:'sms',direction:'out',time:'Apr 15',text:'Sorry we missed you today. Reply if you\'d like to reschedule.'}],serviceEvent:{title:'No-show on Apr 15 · 14 days since last contact',scheduled:'Scheduled for Apr 29: gentle re-engagement (14 days post no-show)',date:'Apr 15'}},
  // ── McGill ENT (Dr. Richardson) surgery scenario ──
  {id:11,industryId:'surgery',notifTitle:'Post-op safety check: Mark R.',contact:'Mark R.',rel:'Patient',type:'check-in',summary:'Post-op day 1 after total thyroidectomy: safety check on voice, swallowing, neck swelling, and hypocalcemia symptoms.',callDraft:'Authenticate (DoB) & check in on Mark post-op day 1 after total thyroidectomy with Dr. Richardson. Ask about voice quality, swallowing, expanding neck swelling or bleeding, and hypocalcemia symptoms (perioral or fingertip paresthesia, muscle cramps, Chvostek sign). Confirm he is taking calcium carbonate 1g TID and calcitriol 0.25mcg daily as prescribed. If any red flags (expanding hematoma, stridor, severe paresthesia), page Dr. Richardson immediately. Otherwise reassure and confirm clinic follow-up next week for pathology.',textDraft:'Hi Mark, this is Dr. Richardson\'s office. We hope you\'re recovering well and would like to check in. Can you call us back on this number please?',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Jan 14',summary:'Initial consult with Dr. Richardson — 3.2cm left thyroid nodule, FNA biopsy Bethesda VI (papillary carcinoma). Total thyroidectomy recommended and discussed.'},{type:'call',direction:'in',time:'Feb 2',summary:'Pre-op clinic. Risks reviewed (RLN injury, hypocalcemia, hematoma). Consent signed. Surgery scheduled Mar 31, MUHC Glen site.'},{type:'sms',direction:'out',time:'Mar 28',text:'Reminder: surgery Monday Mar 31, 7am check-in at MUHC Glen. NPO after midnight Sunday.'},{type:'call',direction:'in',time:'Mar 31',summary:'Surgery day. Total thyroidectomy by Dr. Richardson — no intraop complications, parathyroids preserved, RLNs monitored intact. Discharged same day on calcium carbonate 1g TID + calcitriol 0.25mcg daily. F/U in clinic next week for pathology.'}],serviceEvent:{title:'Total thyroidectomy on Mar 31 with Dr. Richardson (MUHC Glen)',scheduled:'Scheduled for Apr 1: post-op day 1 safety check (24h, all surgical patients)',date:'Mar 31'}},
  // ── Dental: Prep, Fit, Referral ──
  {id:20,industryId:'dental',notifTitle:'Pre-op confirmation: Sophie L.',contact:'Sophie L.',rel:'Patient',type:'check-in',summary:'4 wisdom teeth extraction with IV sedation tomorrow 9am: confirm NPO, ride, pre-meds picked up.',callDraft:'Authenticate (DoB) & confirm Sophie is set for tomorrow\'s wisdom tooth extraction at 9am with IV sedation. Verify NPO since midnight (no food OR water), no aspirin/NSAIDs since Apr 25, ride confirmed (mom), and her oxycodone + antibiotic prescriptions picked up.',textDraft:'Hi Sophie, this is Lakeside Dental. Quick checklist for tomorrow 9am: NPO after midnight (no food or water), no Advil/aspirin since Friday, ride confirmed, meds picked up. Reply YES if all set or call us with questions.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 14',summary:'Initial consult with Dr. Martinez. All 4 wisdom teeth impacted, asymptomatic. IV sedation discussed and recommended for comfort.'},{type:'sms',direction:'out',time:'Apr 16',text:'Sedation consent signed. Surgery scheduled Apr 30, 9am. Pre-op instructions emailed.'},{type:'call',direction:'in',time:'Apr 24',summary:'Sophie called to ask about NPO timing. Confirmed nothing by mouth after midnight night before.'}],serviceEvent:{title:'Wisdom tooth extraction with IV sedation on Apr 30, 9am with Dr. Martinez',scheduled:'Scheduled for Apr 29: 24h pre-op confirmation',date:'Apr 30'}},
  {id:21,industryId:'dental',notifTitle:'Perio re-eval: Renee P.',contact:'Renee P.',rel:'Patient',type:'check-in',summary:'3 months post-SRP: re-eval visit due to re-measure pocket depths.',callDraft:'Call Renee to schedule her 3-month perio re-eval. Last SRP was Jan 28 with hygienist Maria — pocket depths 5-6mm at #24, 25, 26. Re-measure to see if home care is working before deciding maintenance vs surgical referral.',textDraft:'Hi Renee, this is Lakeside Dental. Time for your 3-month perio re-eval — let\'s see how those pocket depths are doing. I have Tue 11am or Thu 3pm. Reply with what works.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Jan 14',summary:'Routine cleaning. Hygienist found 5-6mm pockets at lower premolars/molars (#24-26). Dr. Martinez recommended SRP for active periodontitis.'},{type:'call',direction:'in',time:'Jan 28',summary:'SRP performed lower right quadrant. Local anesthesia, post-op instructions given. Re-eval in 3 months.'},{type:'sms',direction:'out',time:'Feb 1',text:'How\'s healing going? Reply if any unusual sensitivity.'}],serviceEvent:{title:'SRP Jan 28 — pocket depths 5-6mm at #24-26',scheduled:'Scheduled for Apr 28: 3-month perio re-evaluation reminder',date:'Jan 28'}},
  {id:22,industryId:'dental',notifTitle:'OS referral follow-up: Marcus J.',contact:'Marcus J.',rel:'Patient',type:'follow-up',summary:'Referred to Dr. Patel (Austin Oral Surgery) 2.5 weeks ago for impacted #1: follow up did consult book?',callDraft:'Check with Marcus — we referred him to Dr. Patel at Austin Oral Surgery on Apr 10 for impacted upper-right wisdom tooth with periapical lesion. Confirm the consult was scheduled. If not, offer to call Dr. Patel\'s office directly to schedule for him.',textDraft:'Hi Marcus, this is Lakeside Dental. Quick check — were you able to schedule with Dr. Patel\'s office for the wisdom tooth consult? We sent records Apr 10. Let us know if any trouble.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 9',summary:'Routine cleaning. X-ray showed impacted #1 (upper right wisdom tooth) with periapical lesion. Dr. Martinez recommended OS referral.'},{type:'sms',direction:'out',time:'Apr 10',text:'Referral sent to Dr. Patel at Austin Oral Surgery. They\'ll reach out within 2 business days.'},{type:'sms',direction:'out',time:'Apr 21',text:'Just checking — were you able to schedule with Dr. Patel\'s office?'}],serviceEvent:{title:'Referral to Dr. Patel (Austin Oral Surgery) sent Apr 10',scheduled:'Scheduled for Apr 28: 18-day post-referral follow-up',date:'Apr 10'}},
  // ── Gastroenterology: Adoption, Fit, Referral ──
  {id:23,industryId:'gastroenterology',notifTitle:'Post-scope check-in: Helen K.',contact:'Helen K.',rel:'Patient',type:'check-in',summary:'7 days post-screening colonoscopy: pathology back, bowel function back to normal?',callDraft:'Authenticate (DoB) & check on Helen 7 days after her screening colonoscopy. Pathology: 2 tubular adenomas (low-grade dysplasia) removed, recommend 5-year surveillance. Ask about bowel function back to normal, abdominal pain, blood per rectum. Schedule a results discussion if she wants.',textDraft:'Hi Helen, this is Dr. Chen\'s office. Hope you\'re back to normal after your scope last Wednesday. Your pathology is in — all looks good with a 5-year follow-up plan. Want to chat? Reply or call.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 4',summary:'Referral from PCP for screening colonoscopy at age 50.'},{type:'call',direction:'in',time:'Apr 23',summary:'Screening colonoscopy with Dr. Chen. 2 small polyps removed (sigmoid colon). Pathology pending.'},{type:'sms',direction:'out',time:'Apr 23',text:'Procedure complete. Discharge instructions: rest today, soft foods, expect normal bowel function within 24-48h.'}],serviceEvent:{title:'Screening colonoscopy Apr 23 — 2 polyps removed, pathology back Apr 28',scheduled:'Scheduled for Apr 30: 7-day post-procedure check-in + results',date:'Apr 23'}},
  {id:24,industryId:'gastroenterology',notifTitle:'Crohn\'s med titration: Eli S.',contact:'Eli S.',rel:'Patient',type:'check-in',summary:'3 months on Stelara for Crohn\'s flare: still needing prednisone? Labs in? Symptoms improving?',callDraft:'Authenticate (DoB) & check in with Eli 3 months into Stelara. Last flare in Jan was severe — started on prednisone taper plus Stelara. Ask about: (1) symptoms (BMs/day, blood, abdominal pain), (2) prednisone fully tapered off, (3) recent CBC/CMP/CRP results, (4) any infections or fevers.',textDraft:'Hi Eli, this is Dr. Chen\'s office. 3-month check-in on Stelara. How are things? Symptoms calmer? Off the prednisone? Reply or give us a call when you have a minute.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Jan 12',summary:'Severe Crohn\'s flare — 8 BMs/day with blood, weight loss 12lb. Started on prednisone 40mg taper + induction Stelara dose.'},{type:'call',direction:'in',time:'Feb 9',summary:'1-month check-in. Improving — 3 BMs/day, no blood. Prednisone at 20mg. Maintenance Stelara dose given.'},{type:'sms',direction:'in',time:'Mar 14',text:'Prednisone fully tapered today. Feeling well, no symptoms.'}],serviceEvent:{title:'Stelara induction Jan 12 — maintenance ongoing every 8 weeks',scheduled:'Scheduled for Apr 28: 3-month treatment fit check',date:'Jan 12'}},
  {id:25,industryId:'gastroenterology',notifTitle:'Hepatology referral: Lila J.',contact:'Lila J.',rel:'Patient',type:'follow-up',summary:'Liver biopsy 2 weeks ago showed F3 fibrosis: follow up did hepatology consult book?',callDraft:'Authenticate (DoB) & follow up with Lila — her liver biopsy on Apr 14 came back showing F3 (advanced fibrosis) related to MASH. We referred her to Dr. Greene at UT Hepatology for ongoing management. Confirm she scheduled. If not, offer to call Dr. Greene\'s office to schedule for her.',textDraft:'Hi Lila, this is Dr. Chen\'s office. Just checking — did you schedule with Dr. Greene at UT Hepatology? Her team should\'ve reached out last week. Reply or call us if any trouble.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Mar 22',summary:'Elevated LFTs on PCP labs. FibroScan in office showed elevated stiffness. Recommended biopsy to characterize.'},{type:'call',direction:'in',time:'Apr 14',summary:'Liver biopsy. Tolerated well. Pathology pending.'},{type:'call',direction:'out',time:'Apr 21',summary:'AI follow-up with biopsy result. Pathology: F3 fibrosis with MASH. Hepatology referral sent. Lila acknowledged.'}],serviceEvent:{title:'Hepatology referral to Dr. Greene (UT) sent Apr 21 after F3 biopsy',scheduled:'Scheduled for Apr 28: 7-day post-referral follow-up',date:'Apr 21'}},
  // ── Mental Health: Prep, Adoption, Referral ──
  {id:26,industryId:'mental_health',notifTitle:'First-session prep: Carla S.',contact:'Carla S.',rel:'Client',type:'check-in',summary:'First therapy session tomorrow at 4pm: confirm telehealth link, intake forms (PHQ-9, GAD-7) submitted.',callDraft:'Reach out to Carla — first session with Dr. Lee tomorrow at 4pm via telehealth. Confirm she received the telehealth link and tested it works, and has completed PHQ-9, GAD-7, and clinical history forms in the portal. Be warm and reassuring. Mention what to expect.',textDraft:'Hi Carla, this is Lakeside Counseling. Quick check before your first session with Dr. Lee tomorrow at 4pm: (1) telehealth link tested? (2) intake forms in the portal completed? Reply YES if all set, or call us if you need help.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 21',summary:'Initial inquiry call. Looking for therapy support — anxiety, work-related stress. Insurance: Aetna PPO. Booked first session with Dr. Lee for Apr 30.'},{type:'sms',direction:'out',time:'Apr 21',text:'Welcome! Telehealth link emailed. Please complete PHQ-9, GAD-7, and history forms in the portal before our session.'}],serviceEvent:{title:'First session with Dr. Lee on Apr 30, 4pm (telehealth)',scheduled:'Scheduled for Apr 29: 24h first-session prep confirmation',date:'Apr 30'}},
  {id:27,industryId:'mental_health',notifTitle:'First-session fit: Felix N.',contact:'Felix N.',rel:'Client',type:'check-in',summary:'48h after first session with Dr. Lee: did the modality and therapist feel like a good fit?',callDraft:'Reach out to Felix 48h after his first session with Dr. Lee. Brief, warm. Ask: (1) how the session felt, (2) does Dr. Lee feel like a good fit, (3) any questions before the next session, (4) if not a fit, gently offer alternative therapists. No pressure.',textDraft:'Hi Felix, this is Lakeside Counseling. Just checking in after your first session with Dr. Lee. How did it feel? If something\'s off — fit, schedule, anything — please tell us. We can adjust. No pressure to reply if you\'re busy.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 21',summary:'Initial inquiry call. ADHD diagnosis follow-up, looking for support with executive function. Booked first session with Dr. Lee for Apr 28.'},{type:'sms',direction:'out',time:'Apr 27',text:'Quick reminder — first session tomorrow 11am via telehealth.'},{type:'call',direction:'in',time:'Apr 28',summary:'First session with Dr. Lee. Established treatment goals around routines, time management, distraction control.'}],serviceEvent:{title:'First session with Dr. Lee completed Apr 28',scheduled:'Scheduled for Apr 30: 48h first-session fit check',date:'Apr 28'}},
  {id:28,industryId:'mental_health',notifTitle:'Psychiatry referral: Lana W.',contact:'Lana W.',rel:'Client',type:'follow-up',summary:'Referred to Dr. Roberts (psychiatry) 2 weeks ago for SSRI evaluation: follow up did appt book?',callDraft:'Reach out to Lana — Dr. Lee referred her to Dr. Roberts (psychiatrist) on Apr 14 for SSRI medication evaluation given persistent depression symptoms despite therapy. Confirm she scheduled. If not, offer to call Dr. Roberts\'s office to schedule on her behalf.',textDraft:'Hi Lana, this is Lakeside Counseling. Just checking in — were you able to schedule with Dr. Roberts for the medication eval? We sent the referral Apr 14. Reply if any trouble — we can help schedule.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 17',summary:'Session 8 with Dr. Lee. Persistent depressive symptoms despite weekly CBT. PHQ-9 stuck at 14-16. Discussed pharmacological augmentation.'},{type:'call',direction:'in',time:'Apr 14',summary:'Session 12 with Dr. Lee. Lana agreed to consider SSRI eval. Referral to Dr. Roberts (psychiatrist) sent.'},{type:'sms',direction:'out',time:'Apr 14',text:'Referral sent to Dr. Roberts at Westside Psychiatry. They\'ll reach out within a week.'}],serviceEvent:{title:'Psychiatry referral to Dr. Roberts sent Apr 14 for SSRI evaluation',scheduled:'Scheduled for Apr 28: 14-day post-referral follow-up',date:'Apr 14'}},
  // ── Oncology: Prep, Fit, Referral ──
  {id:29,industryId:'oncology',notifTitle:'Pre-infusion prep: Aiden M.',contact:'Aiden M.',rel:'Patient',type:'check-in',summary:'24h before chemo cycle 4 (FOLFOX): labs in window, port plan, transport confirmed, pre-meds taken.',callDraft:'Authenticate (DoB) & confirm Aiden is set for chemo cycle 4 (FOLFOX) tomorrow 9am. Verify: (1) labs drawn this week (CBC, CMP, CEA), (2) port access plan with infusion nurse, (3) transport confirmed, (4) pre-medications (dexamethasone) taken last night and this morning, (5) emend filled for nausea.',textDraft:'Hi Aiden, this is Dr. Ali\'s office. Quick checklist for cycle 4 tomorrow: labs drawn this week ✓, dexamethasone last night and this morning ✓, ride for tomorrow ✓. Reply YES if all set or call if anything\'s off.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Jan 8',summary:'Initial consult — stage III colon cancer, FOLFOX recommended. Port placement scheduled.'},{type:'call',direction:'in',time:'Feb 5',summary:'Cycle 1 FOLFOX. Tolerated well, mild nausea.'},{type:'call',direction:'in',time:'Mar 5',summary:'Cycle 2 FOLFOX. Mild fatigue, neuropathy starting.'},{type:'call',direction:'in',time:'Apr 5',summary:'Cycle 3 FOLFOX. Neuropathy worsening — discussed dose modification.'}],serviceEvent:{title:'Chemo cycle 4 (FOLFOX) scheduled Apr 30, 9am',scheduled:'Scheduled for Apr 29: 24h pre-infusion confirmation',date:'Apr 30'}},
  {id:30,industryId:'oncology',notifTitle:'30-day support check: Carmen L.',contact:'Carmen L.',rel:'Patient',type:'check-in',summary:'30 days into pembrolizumab regimen: energy levels, support system, financial counseling needs?',callDraft:'Authenticate (DoB) & check in with Carmen 30 days into pembrolizumab. Beyond clinical side effects (covered at 48h post-infusion), ask about: (1) energy and ability to do daily activities, (2) family/social support, (3) financial concerns, (4) whether she\'s connected with our patient navigator and social work team.',textDraft:'Hi Carmen, this is Dr. Ali\'s office. Just checking in — beyond the medical stuff, how are you doing overall? Energy, family, finances, any support gaps. Want to chat or get connected with our patient navigator? Reply or call.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Mar 3',summary:'Initial consult — metastatic melanoma, pembrolizumab recommended.'},{type:'call',direction:'in',time:'Mar 30',summary:'Pembrolizumab cycle 1. Tolerated well.'},{type:'call',direction:'out',time:'Apr 1',summary:'AI 48h check-in. Mild fatigue only, no other CTCAE concerns.'},{type:'call',direction:'in',time:'Apr 20',summary:'Pembrolizumab cycle 2. No new symptoms.'}],serviceEvent:{title:'Pembrolizumab regimen started Mar 30 (every 3 weeks)',scheduled:'Scheduled for Apr 28: 30-day long-horizon support check',date:'Mar 30'}},
  {id:31,industryId:'oncology',notifTitle:'Surgical onc referral: Diego R.',contact:'Diego R.',rel:'Patient',type:'follow-up',summary:'Referred to Dr. Park (surgical oncology) 10 days ago for tumor resection consult: did consult book?',callDraft:'Authenticate (DoB) & follow up with Diego — neoadjuvant chemo course is complete and we referred him to Dr. Park (surgical oncology) on Apr 18 for resection consult. Confirm consult booked. If not, offer to call Dr. Park\'s office on his behalf.',textDraft:'Hi Diego, this is Dr. Ali\'s office. Just checking — were you able to schedule with Dr. Park for the surgery consult? We sent records Apr 18. Reply if any trouble.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Jan 22',summary:'Initial consult — resectable pancreatic adenocarcinoma. Neoadjuvant FOLFIRINOX × 4 cycles, then surgery.'},{type:'call',direction:'in',time:'Apr 14',summary:'Cycle 4 complete. Restaging imaging shows good response. Time to refer for surgery consult.'},{type:'sms',direction:'out',time:'Apr 18',text:'Referral sent to Dr. Park at UT Surgical Oncology. They\'ll reach out within a week.'}],serviceEvent:{title:'Surgical onc referral to Dr. Park sent Apr 18 after neoadjuvant chemo',scheduled:'Scheduled for Apr 28: 10-day post-referral follow-up',date:'Apr 18'}},
  // ── Primary Care: Prep, Referral ──
  {id:32,industryId:'primary_care',notifTitle:'Fasting labs prep: Sandra B.',contact:'Sandra B.',rel:'Patient',type:'check-in',summary:'Annual physical with fasting labs tomorrow 8am: NPO after midnight (water OK), bring meds + insurance card.',callDraft:'Authenticate (DoB) & confirm Sandra is set for tomorrow\'s annual physical at 8am with Dr. Kim. Critical: NPO after midnight (water OK) for fasting glucose + lipid panel. Bring all current medications in their bottles, insurance card, recent BP log if she has one.',textDraft:'Hi Sandra, this is Dr. Kim\'s office. Quick reminder for tomorrow 8am: NO food after midnight (water is fine), bring all your meds in their bottles, and your insurance card. Reply YES if all set.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 22',summary:'Sandra called to schedule her overdue annual. Last visit Aug 2024.'},{type:'sms',direction:'out',time:'Mar 22',text:'Annual physical with Dr. Kim scheduled Apr 30, 8am. Fasting labs included.'},{type:'sms',direction:'out',time:'Apr 27',text:'Reminder: annual physical Wed 4/30 at 8am. NPO after midnight Tuesday.'}],serviceEvent:{title:'Annual physical Apr 30, 8am with Dr. Kim — fasting labs (lipid + glucose)',scheduled:'Scheduled for Apr 29: 24h fasting labs prep confirmation',date:'Apr 30'}},
  {id:33,industryId:'primary_care',notifTitle:'Cardiology referral: Henry M.',contact:'Henry M.',rel:'Patient',type:'follow-up',summary:'Referred to cardiology 2 weeks ago for new-onset atrial fibrillation: follow up did consult book?',callDraft:'Authenticate (DoB) & follow up with Henry — we referred him to Dr. Singh (cardiology) on Apr 14 for new-onset paroxysmal afib found on Holter monitor. He\'s on apixaban for stroke prevention. Confirm consult booked. If not, offer to call Dr. Singh\'s office to schedule.',textDraft:'Hi Henry, this is Dr. Kim\'s office. Quick check — were you able to schedule with Dr. Singh for the heart consult? We sent records Apr 14. Reply if any trouble.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 1',summary:'Annual physical. Reported episodes of palpitations. EKG normal at rest. Holter monitor placed.'},{type:'call',direction:'in',time:'Apr 12',summary:'Holter results showed paroxysmal afib (3 episodes >30 sec). Started on apixaban. Cardiology referral discussed.'},{type:'sms',direction:'out',time:'Apr 14',text:'Referral sent to Dr. Singh at Austin Cardiology. They\'ll reach out within a week.'}],serviceEvent:{title:'Cardiology referral to Dr. Singh sent Apr 14 after Holter showed afib',scheduled:'Scheduled for Apr 28: 14-day post-referral follow-up',date:'Apr 14'}},
  // ── Pharmacy: Prep, Fit, Referral ──
  {id:34,industryId:'pharmacy',notifTitle:'Cold-chain delivery prep: Linda H.',contact:'Linda H.',rel:'Patient',type:'check-in',summary:'Mounjaro shipping tomorrow (cold-chain): confirm someone home for signature, fridge ready.',callDraft:'Authenticate (DoB) & confirm Linda for tomorrow\'s Mounjaro delivery. Critical: cold-chain shipment — must be received by an adult and refrigerated immediately. Confirm: (1) someone home Wed 10am-2pm for signature, (2) fridge cleared, (3) Linda knows to NOT leave package in mailbox/porch.',textDraft:'Hi Linda, this is Safer Pharmacy. Your Mounjaro is shipping tomorrow with a Wed 10am-2pm window. Must be signed for and refrigerated right away (heat ruins it). Will someone be home? Reply YES or let us know to reschedule.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 14',summary:'New patient intake. Transferring Mounjaro 5mg from Walgreens. Insurance: BCBS PPO.'},{type:'sms',direction:'out',time:'Apr 21',text:'Welcome to Safer Pharmacy! Your Mounjaro Rx received and prior auth approved.'},{type:'call',direction:'in',time:'Apr 25',summary:'Linda confirmed delivery address and asked about cold-chain handling. Pharmacist explained refrigeration and 21-day room-temp limit after first use.'}],serviceEvent:{title:'Mounjaro 5mg shipping Apr 30 (cold-chain, signature required)',scheduled:'Scheduled for Apr 29: 24h pre-delivery cold-chain confirmation',date:'Apr 30'}},
  {id:35,industryId:'pharmacy',notifTitle:'30-day adherence check: Brian K.',contact:'Brian K.',rel:'Patient',type:'check-in',summary:'30 days on Mounjaro 2.5mg: adherence OK? Side effects manageable? Time for dose escalation to 5mg?',callDraft:'Authenticate (DoB) & check in with Brian after 30 days on Mounjaro 2.5mg starter dose. Ask about: (1) adherence (4 doses on schedule?), (2) side effects (nausea, fatigue, GI), (3) any weight changes, (4) appetite/satiety changes, (5) ready to escalate to 5mg or stay at 2.5mg longer. Relay to Dr. Patel if dose change needed.',textDraft:'Hi Brian, this is Safer Pharmacy. 30-day check-in on Mounjaro. How are things? Any nausea or other side effects? Weight changes? Reply or call us. Want to chat with the pharmacist? Just say so.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Mar 25',summary:'New Mounjaro Rx from Dr. Patel. Starter dose 2.5mg weekly. Counseling provided on injection technique, storage, side effect expectations.'},{type:'sms',direction:'out',time:'Mar 28',text:'First Mounjaro pen shipped. Refrigerate on arrival.'},{type:'call',direction:'in',time:'Apr 5',summary:'Brian called to ask about mild nausea. Pharmacist advised: usually improves after first 2 weeks, take with food, plenty of water.'}],serviceEvent:{title:'Mounjaro 2.5mg started Mar 28 — 4 weekly doses completed',scheduled:'Scheduled for Apr 28: 30-day adherence + tolerability check',date:'Mar 28'}},
  {id:36,industryId:'pharmacy',notifTitle:'Prescriber outreach: Dr. Patel re: Brian K.',contact:'Dr. Patel\'s office',rel:'Prescriber',type:'follow-up',summary:'Brian K. on Mounjaro 5mg reporting persistent nausea: relay to Dr. Patel for dose guidance.',callDraft:'Call Dr. Patel\'s office on behalf of patient Brian K. (DOB on file). Brian escalated to Mounjaro 5mg 2 weeks ago and is reporting persistent moderate nausea (3-4 days/week, no vomiting, no dehydration). Want guidance: (1) hold at 5mg longer, (2) drop back to 2.5mg, (3) try ondansetron PRN. Reply with Dr. Patel\'s recommendation.',textDraft:'Hi, this is Safer Pharmacy. Patient Brian K. (DOB 6/14/82, Mounjaro 5mg) reporting persistent moderate nausea 2 wks post-escalation. Could Dr. Patel advise: hold 5mg, drop to 2.5mg, or add ondansetron PRN? Will relay to patient.',due:'Today',sendAs:'text',earlierItems:[{type:'sms',direction:'in',time:'Apr 21',text:'Brian called pharmacy line: persistent nausea since dose escalation, asking about options.'},{type:'call',direction:'in',time:'Apr 22',summary:'Pharmacist spoke with Brian. Confirmed adherence and timing of nausea. Suggested we contact Dr. Patel for dose guidance.'},{type:'sms',direction:'out',time:'Apr 23',text:'(To Brian) We\'ll reach out to Dr. Patel\'s office about your nausea. Will get back to you within 1-2 days.'}],serviceEvent:{title:'Brian K. dose escalation to 5mg on Apr 14 → persistent nausea reported Apr 21',scheduled:'Scheduled for Apr 28: prescriber outreach for dose guidance',date:'Apr 14'}},
  // ── Surgery: Prep, Fit, Referral ──
  {id:37,industryId:'surgery',notifTitle:'72h pre-op: Tara H.',contact:'Tara H.',rel:'Patient',type:'check-in',summary:'72h before total thyroidectomy: NPO plan, anticoag held, labs in, transport confirmed.',callDraft:'Authenticate (DoB) & confirm Tara is on track for thyroidectomy Apr 30, 7am at MUHC Glen with Dr. Richardson. Check: (1) clopidogrel held since Apr 23, (2) NPO after midnight Apr 29, (3) pre-op labs (CBC, CMP, TSH) in window, (4) cardiac clearance done, (5) transport escort confirmed for Apr 30 + post-discharge.',textDraft:'Hi Tara, this is Dr. Richardson\'s office. 72-hour check before surgery Apr 30. Plavix held since Apr 23 ✓, NPO after midnight Tuesday ✓, ride confirmed ✓? Reply YES if all set or call us with questions.',due:'Today',sendAs:'call',earlierItems:[{type:'call',direction:'in',time:'Feb 18',summary:'Initial consult — 2.8cm right thyroid nodule, FNA showed papillary microcarcinoma. Total thyroidectomy recommended.'},{type:'call',direction:'in',time:'Mar 28',summary:'Pre-op clinic. Labs ordered. Plavix-hold instructions given (stop 7 days pre-op).'},{type:'sms',direction:'out',time:'Apr 21',text:'Reminder: stop Plavix on Apr 23 (7 days before surgery). Continue your other meds.'},{type:'call',direction:'in',time:'Apr 24',summary:'Tara called to confirm she stopped Plavix on Apr 23. Asked about NPO timing.'}],serviceEvent:{title:'Total thyroidectomy Apr 30, 7am at MUHC Glen with Dr. Richardson',scheduled:'Scheduled for Apr 27: 72h pre-op confirmation',date:'Apr 30'}},
  {id:38,industryId:'surgery',notifTitle:'6-wk post-op: Greg P.',contact:'Greg P.',rel:'Patient',type:'check-in',summary:'6 weeks post-laparoscopic cholecystectomy: scar healed, return to activity, any incisional pain?',callDraft:'Authenticate (DoB) & check in with Greg 6 weeks after laparoscopic cholecystectomy. Ask about: (1) incision sites — fully healed? Any redness, swelling, drainage? (2) abdominal pain at activity? (3) return to work and exercise? (4) GI changes (looser stools post-chole, fatty food intolerance)? (5) any new symptoms warranting f/u.',textDraft:'Hi Greg, this is Dr. Richardson\'s office. 6 weeks post-surgery — how are things? Scars healing? Back to normal activity? Any tummy issues with food? Reply or call us when you have a minute.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Feb 28',summary:'Initial consult — symptomatic gallstones with biliary colic. Lap chole recommended.'},{type:'call',direction:'in',time:'Mar 18',summary:'Lap cholecystectomy completed. No complications. Discharged same day.'},{type:'call',direction:'out',time:'Mar 19',summary:'AI post-op day 1 check. Mild incisional pain managed with Tylenol. No fever, drainage looks clean.'},{type:'call',direction:'in',time:'Apr 1',summary:'2-week clinic visit. Wounds healing well. Diet advancing. Cleared for light activity.'}],serviceEvent:{title:'Lap cholecystectomy Mar 18 with Dr. Richardson',scheduled:'Scheduled for Apr 29: 6-week post-op return-to-normal check',date:'Mar 18'}},
  {id:39,industryId:'surgery',notifTitle:'Lymphedema PT referral: Olivia D.',contact:'Olivia D.',rel:'Patient',type:'follow-up',summary:'Referred to lymphedema PT 1 week ago after mastectomy + ALND: follow up did initial visit happen?',callDraft:'Authenticate (DoB) & follow up with Olivia — we referred her to Austin Lymphedema PT (Sara Brown PT) on Apr 21 after mastectomy + axillary lymph node dissection. Confirm she had her initial visit. If not, offer to call Sara\'s office to schedule on her behalf. Lymphedema prevention starts early.',textDraft:'Hi Olivia, this is Dr. Richardson\'s office. Quick check — were you able to start with Sara at Austin Lymphedema PT? We referred Apr 21. Reply if any trouble — we can help schedule.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 14',summary:'Initial consult — left breast cancer, lumpectomy + sentinel node showed positive nodes. Recommended completion mastectomy + ALND.'},{type:'call',direction:'in',time:'Apr 7',summary:'Mastectomy + ALND completed. 8 positive nodes. Adjuvant chemo + radiation discussed.'},{type:'call',direction:'in',time:'Apr 21',summary:'2-week post-op visit. Wounds healing. Lymphedema PT referral discussed and sent to Sara Brown.'},{type:'sms',direction:'out',time:'Apr 21',text:'Lymphedema PT referral sent to Sara Brown at Austin Lymphedema PT. They\'ll reach out within a week.'}],serviceEvent:{title:'Lymphedema PT referral to Sara Brown sent Apr 21 post-mastectomy + ALND',scheduled:'Scheduled for Apr 28: 7-day post-referral follow-up',date:'Apr 21'}},
  // ── Residential: Prep, Adoption, Fit, Referral ──
  {id:40,industryId:'residential',notifTitle:'Pre-closing prep: Owen T.',contact:'Owen T.',rel:'Buyer',type:'check-in',summary:'48h before closing on 1245 Maple: certified funds wired, gov ID, walkthrough scheduled.',callDraft:'Call Owen — 48 hours before closing on 1245 Maple at 10am Apr 30. Critical checklist: (1) cashier\'s check for $42,318 OR wire confirmed with Stewart Title, (2) gov ID (driver\'s license + secondary), (3) final walkthrough Apr 29 4pm, (4) utilities transferred Apr 30 (Austin Energy + Spectrum).',textDraft:'Hi Owen, James from Acme Realty. T-minus 48h to closing. Quick checklist: cashier\'s check or wire confirmed ($42,318), driver\'s license + 2nd ID, walkthrough Apr 29 4pm, utilities transferred 4/30. Reply YES on each or let me know what\'s outstanding.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Mar 5',summary:'First call — looking for a 4BR in South Austin, $700-800k, ready to close in 60 days. Pre-approved with Wells Fargo.'},{type:'call',direction:'in',time:'Mar 22',summary:'Walked 1245 Maple. Loved layout and yard. Offered $755k.'},{type:'sms',direction:'out',time:'Apr 8',text:'Inspection done. Minor electrical to be credited. Closing on track for Apr 30.'},{type:'call',direction:'in',time:'Apr 21',summary:'Owen called with question about title insurance. Walked through.'}],serviceEvent:{title:'Closing Apr 30, 10am at Stewart Title — 1245 Maple, $755,000',scheduled:'Scheduled for Apr 28: 48h pre-closing buyer prep',date:'Apr 30'}},
  {id:41,industryId:'residential',notifTitle:'Move-in adoption: Naomi W.',contact:'Naomi W.',rel:'Buyer',type:'check-in',summary:'1 week after closing on 422 Cedar: moving in OK? Need contractor or utility referrals?',callDraft:'Call Naomi 1 week after closing on 422 Cedar. Brief, warm. Ask: (1) move-in went smoothly? (2) any issues with the home (HVAC, plumbing, anything from inspection list)? (3) need referrals for painters, electricians, lawn service, or anything else? Offer to share Acme\'s vetted contractor list.',textDraft:'Hi Naomi, James from Acme Realty. Hope the move-in went smoothly! Anything popping up at 422 Cedar? Need contractor referrals (painters, lawn, etc.)? Reply or call — happy to share my list.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Jan 12',summary:'First call — looking for a starter home, $400-450k, East Austin. Pre-approved.'},{type:'call',direction:'in',time:'Mar 1',summary:'Walked 422 Cedar. Made offer at $432k.'},{type:'sms',direction:'out',time:'Apr 21',text:'Closing day! 422 Cedar is yours. 🎉 Keys at title.'},{type:'sms',direction:'in',time:'Apr 22',text:'Thank you so much! We\'re moving in this weekend.'}],serviceEvent:{title:'Closed on 422 Cedar Apr 21 — $432,000',scheduled:'Scheduled for Apr 28: 1-week move-in check',date:'Apr 21'}},
  {id:42,industryId:'residential',notifTitle:'6-month check-in: Daniel B.',contact:'Daniel B.',rel:'Buyer',type:'check-in',summary:'6 months in at 89 Birch: how is the home? Any issues with the renovations he discussed?',callDraft:'Call Daniel 6 months after closing on 89 Birch. Ask how the home is treating him, whether the kitchen reno he mentioned ever happened, if any issues with the home, and if he or anyone in his network is thinking of buying or selling.',textDraft:'Hi Daniel, James from Acme Realty. 6 months in at 89 Birch! How\'s the kitchen reno going (or not)? Anything popping up with the home? Reply or call. PS — anyone in your circle thinking of buying or selling?',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Sep 4, 2025',summary:'First call — looking for a 3BR with renovation potential in $500-600k range.'},{type:'call',direction:'in',time:'Oct 12, 2025',summary:'Walked 89 Birch. Loved bones, planning kitchen reno. Offered $545k.'},{type:'sms',direction:'out',time:'Oct 28, 2025',text:'Closing day! 89 Birch is yours.'},{type:'sms',direction:'out',time:'Jan 28',text:'Happy 3-month at 89 Birch. Need any contractor referrals for the kitchen?'}],serviceEvent:{title:'Closed on 89 Birch Oct 28, 2025 — $545,000',scheduled:'Scheduled for Apr 28: 6-month relational check-in',date:'Oct 28, 2025'}},
  {id:43,industryId:'residential',notifTitle:'Lender referral: Sienna M.',contact:'Sienna M.',rel:'Prospect',type:'follow-up',summary:'Referred to Wells Fargo loan officer 1 week ago for pre-approval: did pre-approval move forward?',callDraft:'Call Sienna — first-time buyer, we referred her to Mike Chen (Wells Fargo loan officer) on Apr 21 to start pre-approval. Confirm she connected with Mike and whether pre-approval is moving forward. If not, offer to call Mike and re-engage.',textDraft:'Hi Sienna, James from Acme Realty. Quick check — were you able to connect with Mike at Wells Fargo about the pre-approval? We sent the intro Apr 21. Reply if anything stalled — happy to nudge.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 17',summary:'First call — first-time buyer, looking $400-475k in North Austin, no pre-approval yet. Targeting 60-90 day close.'},{type:'sms',direction:'out',time:'Apr 21',text:'Introducing you to Mike Chen at Wells Fargo for pre-approval. He\'ll reach out today. mike.chen@wellsfargo.com / 512-555-0192'}],serviceEvent:{title:'Lender intro to Mike Chen (Wells Fargo) sent Apr 21',scheduled:'Scheduled for Apr 28: 7-day post-intro follow-up',date:'Apr 21'}},
  // ── Equipment Rental: Prep, Fit ──
  {id:44,industryId:'equipment_rental',notifTitle:'Pre-delivery site prep: Jorge V.',contact:'Jorge V.',rel:'Client',type:'check-in',summary:'24h before mini excavator delivery to 1500 Industrial: gate code, on-site contact, operator cert on file.',callDraft:'Call Jorge — mini excavator delivery to 1500 Industrial Blvd tomorrow 7am. Confirm: (1) gate code or unlocked access at 7am, (2) on-site contact name + cell for our driver, (3) operator certification card on file (we have OSHA cert from 2024 — still valid?), (4) where on the lot to drop the unit.',textDraft:'Hi Jorge, John from All Access. Excavator delivery to 1500 Industrial 7am tomorrow. Need: gate code/contact for 7am access, where to drop on-site, operator cert still valid? Reply or call.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 18',summary:'Inquiry — needs mini excavator for utility trench job at 1500 Industrial. Quote sent.'},{type:'sms',direction:'out',time:'Apr 21',text:'Quote accepted. Mini excavator (Cat 305): $250/day, $750/wk. Delivery Apr 30, 7am.'},{type:'call',direction:'in',time:'Apr 25',summary:'Jorge confirmed rental terms. Asked about delivery details — said he\'ll have a worker on site at 7am.'}],serviceEvent:{title:'Mini excavator delivery Apr 30, 7am at 1500 Industrial Blvd',scheduled:'Scheduled for Apr 29: 24h pre-delivery site access prep',date:'Apr 30'}},
  {id:45,industryId:'equipment_rental',notifTitle:'Mid-rental check: Frank C.',contact:'Frank C.',rel:'Client',type:'check-in',summary:'Day 14 of 30-day boom rental at 800 Commerce: equipment running OK? Need fuel/parts?',callDraft:'Call Frank — halfway through his 30-day boom lift rental at 800 Commerce. Brief check-in: (1) boom running OK? (2) any maintenance issues, fuel needs, parts? (3) timeline still on track for May 16 return or extending? (4) operator + supplies still squared away?',textDraft:'Hi Frank, John from All Access. Halfway through your boom rental — how\'s it running? Any issues, fuel, or parts? Still on track for May 16 return? Reply or call when you have a sec.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 12',summary:'Inquiry — needs boom lift for facade work at 800 Commerce, 30-day rental.'},{type:'sms',direction:'out',time:'Apr 14',text:'Quote: 40-ft boom $650/wk, $1,800/mo. Delivery Apr 16.'},{type:'call',direction:'in',time:'Apr 16',summary:'Boom delivered to 800 Commerce. Frank confirmed setup OK.'},{type:'call',direction:'out',time:'Apr 17',summary:'AI day-1 delivery check. Setup confirmed OK, operator equipped.'}],serviceEvent:{title:'40-ft boom rental started Apr 16, 30-day term ends May 16',scheduled:'Scheduled for Apr 28: mid-rental performance check (day 14)',date:'Apr 16'}},
  // ── Inquiry Follow-up: one warm lead in flight per sub-industry ──
  {id:46,industryId:'dental',notifTitle:'Inquiry F/U attempt 3 of 3: Aaron M.',contact:'Aaron M.',rel:'Prospect',type:'follow-up',summary:'Inquired about Invisalign 2 days ago, hasn\'t booked consult: attempt 3 of 3 (Same day → +1d → +2d).',callDraft:'Call Aaron — inquired about Invisalign on Apr 26 from our website. Got auto-text receipt + financing reply but hasn\'t booked the free consult. Acknowledge cost can feel daunting; offer the $99 consult-with-3D-scan special and 0% financing through Sunbit. If silence after this attempt, archive lead.',textDraft:'Hi Aaron, James at Lakeside Dental. 3rd and final ping on the Invisalign consult — the $99 scan-and-plan offer is good through Friday. Still want to lock it in? Reply YES and I\'ll grab Tue or Thu.',due:'Today',sendAs:'text',earlierItems:[{type:'sms',direction:'in',time:'Apr 26, 2:18p',text:'Online inquiry: "Wondering about Invisalign cost and timeline. Currently a Delta Dental member."'},{type:'sms',direction:'out',time:'Apr 26, 2:19p',text:'Hi Aaron! Thanks for reaching out. Free 30-min Invisalign consult includes a 3D scan + cost breakdown. Tue 10am or Thu 2pm work? We accept Delta and offer Sunbit financing.'},{type:'sms',direction:'out',time:'Apr 27, 10:00a',text:'Hi Aaron — quick follow-up. Still keen on the consult? Happy to answer any questions before booking.'}],serviceEvent:{title:'Invisalign inquiry from website Apr 26 — no consult booked',scheduled:'Inquiry F/U attempt 3 of 3 (cadence: same day → +1d → +2d)',date:'Apr 26'}},
  {id:47,industryId:'gastroenterology',notifTitle:'Inquiry F/U attempt 2 of 3: Marcus B.',contact:'Marcus B.',rel:'Prospect',type:'follow-up',summary:'Consult done Apr 27, scope recommended, hasn\'t scheduled: attempt 2 of 3 (Same day → +1d → +2d).',callDraft:'Call Marcus — consult with Dr. Chen on Apr 27, recommended screening colonoscopy due to family history. He left without booking. Address common blockers: bowel prep is one day not three, sedation makes you sleep through it, transport — ask if there\'s a friend/family member he could line up. Offer 2 slot options.',textDraft:'Hi Marcus, this is Dr. Chen\'s office. Following up on yesterday\'s visit. Most folks tell us the prep is the hardest part — we can walk you through what to expect. Ready to lock a date? I have May 8 (10am) or May 12 (1pm).',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 27',summary:'Consult with Dr. Chen. Family history of colon cancer (father, age 55). Screening colonoscopy recommended.'},{type:'sms',direction:'out',time:'Apr 27, 4:30p',text:'Thanks for coming in today, Marcus. Ready to lock in your screening date? I have multiple options this week and next.'}],serviceEvent:{title:'Consult Apr 27 with Dr. Chen — screening colonoscopy recommended, not scheduled',scheduled:'Inquiry F/U attempt 2 of 3 (cadence: same day → +1d → +2d)',date:'Apr 27'}},
  {id:48,industryId:'mental_health',notifTitle:'Inquiry F/U attempt 2 of 3: Priya R.',contact:'Priya R.',rel:'Prospect',type:'follow-up',summary:'Inquired 3 days ago re: anxiety + work stress, hasn\'t booked first session: attempt 2 of 3 (Same day → +3d → +7d, gentler cadence).',callDraft:'Reach Priya gently — inquired Apr 25, briefly described anxiety + work stress. Insurance is BCBS PPO. She got the welcome reply but hasn\'t booked. Acknowledge it can be hard to take the first step. Offer to answer any questions about Dr. Lee or the modality. No pressure.',textDraft:'Hi Priya, this is Lakeside Counseling. Just a gentle follow-up on your inquiry — no pressure. If it would help, happy to chat through what a first session looks like or answer any insurance questions. We\'re here when you\'re ready.',due:'Today',sendAs:'text',earlierItems:[{type:'sms',direction:'in',time:'Apr 25, 7:42p',text:'Online inquiry: "Looking for therapy for anxiety and work stress. BCBS PPO. Prefer telehealth."'},{type:'sms',direction:'out',time:'Apr 25, 7:45p',text:'Hi Priya, thanks for reaching out. Dr. Lee specializes in anxiety + CBT and has telehealth slots open. We\'re in-network with BCBS. Want to book a 60-min intake? Reply with availability or call us.'}],serviceEvent:{title:'Therapy inquiry Apr 25 — no first session booked',scheduled:'Inquiry F/U attempt 2 of 3 (gentler cadence: same day → +3d → +7d)',date:'Apr 25'}},
  {id:49,industryId:'oncology',notifTitle:'Inquiry F/U attempt 2 of 3: Nadia P.',contact:'Nadia P.',rel:'Prospect',type:'follow-up',summary:'Second-opinion consult Apr 25, hasn\'t decided to start treatment with us: attempt 2 of 3 (Same day → +3d → +7d, gentler cadence).',callDraft:'Reach Nadia gently — saw Dr. Ali on Apr 25 for second opinion (stage II breast cancer, considering between us and MD Anderson). Acknowledge the gravity of the decision. Offer to talk through clinical-trial eligibility or to connect her with our patient navigator for financial / family questions. No pressure.',textDraft:'Hi Nadia, this is Dr. Ali\'s office. Just checking in — wherever you decide to receive care, we\'re rooting for you. If it would help, happy to clarify any of the clinical-trial options Dr. Ali mentioned, or connect you with Janet (our patient navigator) for financial / family questions. No pressure to decide.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 25',summary:'Second-opinion consult with Dr. Ali. Discussed treatment plan, clinical-trial eligibility, comparison with MD Anderson recommendation.'},{type:'sms',direction:'out',time:'Apr 25, 5:15p',text:'Thanks for trusting us with a second opinion today, Nadia. Dr. Ali wants you to take all the time you need. I\'m here if any questions come up.'}],serviceEvent:{title:'Second-opinion consult Apr 25 with Dr. Ali — treatment decision pending',scheduled:'Inquiry F/U attempt 2 of 3 (gentler cadence: same day → +3d → +7d)',date:'Apr 25'}},
  {id:50,industryId:'primary_care',notifTitle:'Inquiry F/U attempt 2 of 3: Elena M.',contact:'Elena M.',rel:'Prospect',type:'follow-up',summary:'Inquired 1 day ago about new-patient appt, hasn\'t booked: attempt 2 of 3 (Same day → +1d → +2d).',callDraft:'Call Elena — inquired Apr 27 about new-patient annual physical. Insurance verification was pending; team confirmed BCBS yesterday. Reach out, share that insurance is verified, offer 3 slots this week + next. Mention same-day labs available so she only needs one trip.',textDraft:'Hi Elena, Dr. Kim\'s office. Quick update: your BCBS coverage is verified ✓. I have new-patient slots Wed 9am, Thu 4pm, or next Mon 10am. Same-day fasting labs available — one trip only. Reply with your pick.',due:'Today',sendAs:'text',earlierItems:[{type:'sms',direction:'in',time:'Apr 27, 11:14a',text:'Online inquiry: "Looking for a new PCP. Have BCBS PPO. Need annual physical."'},{type:'sms',direction:'out',time:'Apr 27, 11:18a',text:'Hi Elena! Thanks for reaching out. Verifying your BCBS now — usually takes 24h. I\'ll text once cleared with available appointment slots.'}],serviceEvent:{title:'New-patient inquiry Apr 27 — insurance now verified, no appt booked',scheduled:'Inquiry F/U attempt 2 of 3 (cadence: same day → +1d → +2d)',date:'Apr 27'}},
  {id:51,industryId:'pharmacy',notifTitle:'Inquiry F/U attempt 2 of 3: Rita S.',contact:'Rita S.',rel:'Prospect',type:'follow-up',summary:'Started Wegovy transfer-in Apr 27, hasn\'t completed: attempt 2 of 3 (Same day → +1d → +2d).',callDraft:'Reach Rita — started Wegovy transfer from Walgreens on Apr 27. Prior auth came back approved this morning. We\'re ready to ship cold-chain by Friday at $25 less than her current pharmacy. Confirm address + signature for signature delivery.',textDraft:'Hi Rita, Safer Pharmacy. Quick update: your Wegovy prior auth is approved ✓ and we\'re $25 below your last fill at Walgreens. Ready to ship Fri (cold-chain, signature). Confirm your address?',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 27, 1:02p',summary:'Inquiry — Rita asked about transferring her Wegovy Rx from Walgreens. Got pricing comparison and prior auth started.'},{type:'sms',direction:'out',time:'Apr 27, 1:30p',text:'Hi Rita! Wegovy transfer initiated. Prior auth submitted to BCBS — usually 24-48h. I\'ll text once approved with shipping ETA.'}],serviceEvent:{title:'Wegovy transfer-in Apr 27 — prior auth now approved, transfer not completed',scheduled:'Inquiry F/U attempt 2 of 3 (cadence: same day → +1d → +2d)',date:'Apr 27'}},
  {id:52,industryId:'surgery',notifTitle:'Inquiry F/U attempt 2 of 3: Charles W.',contact:'Charles W.',rel:'Prospect',type:'follow-up',summary:'Surgical consult Apr 26 (hernia repair), hasn\'t scheduled: attempt 2 of 3 (Same day → +1d → +2d).',callDraft:'Reach Charles — saw Dr. Richardson Apr 26, recommended laparoscopic inguinal hernia repair (symptomatic for 6 months). He left without booking. Common blockers at this stage: time off work, fear, cost. He\'s on Aetna, the surgery is fully covered. Offer: 3 OR slots in next 4 weeks + the option to talk through fears with Dr. Richardson by phone.',textDraft:'Hi Charles, Dr. Richardson\'s office. Following up on yesterday\'s visit. Aetna will cover the procedure 100% after deductible. I have OR slots May 12, May 19, or May 27. Want me to hold one? Or happy to schedule a 10-min phone call with Dr. Richardson to talk through any concerns.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 26',summary:'Consult with Dr. Richardson. Symptomatic right inguinal hernia, 6-month duration. Lap repair recommended. Aetna PPO.'},{type:'sms',direction:'out',time:'Apr 26, 5:30p',text:'Thanks for coming in today, Charles. Whenever you\'re ready to book, we have a few OR slots over the next 4 weeks. Insurance ran clean.'}],serviceEvent:{title:'Surgical consult Apr 26 with Dr. Richardson — lap hernia repair recommended, not scheduled',scheduled:'Inquiry F/U attempt 2 of 3 (cadence: same day → +1d → +2d)',date:'Apr 26'}},
  {id:53,industryId:'residential',notifTitle:'Inquiry F/U attempt 3 of 3: Priscilla J.',contact:'Priscilla J.',rel:'Prospect',type:'follow-up',summary:'Showed 1245 Maple Apr 26, no offer yet: attempt 3 of 3 (Same day → +1d → +2d).',callDraft:'Call Priscilla — toured 1245 Maple on Apr 26 with strong positive reaction (loved the kitchen + yard) but didn\'t make an offer. Two other comparable homes she was considering went under contract this weekend, narrowing her options. Offer to write up the offer today and walk through pricing strategy.',textDraft:'Hi Priscilla, James from Acme Realty. Quick heads up — the two other homes you liked just went under contract this weekend. 1245 Maple is your strongest play and seller signaled willingness to negotiate. Want to draft an offer this afternoon? I can come to you.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 22',summary:'First call — looking for a 4BR in South Austin, $700-800k, 60-day close. Pre-approved with Wells Fargo.'},{type:'call',direction:'in',time:'Apr 26',summary:'Toured 1245 Maple. Loved kitchen + yard. Said she\'d "think about it." Did not make offer.'},{type:'sms',direction:'out',time:'Apr 26, 7:00p',text:'Such a fun showing today! Loved seeing your reaction to that kitchen. Let me know if any questions come up — happy to write up an offer whenever you\'re ready.'},{type:'sms',direction:'out',time:'Apr 27, 10:00a',text:'Quick FYI — saw you also toured 89 Pine. Heads up that one had 3 offers Friday. 1245 Maple is still wide open.'}],serviceEvent:{title:'Showed 1245 Maple Apr 26 — strong reaction, no offer',scheduled:'Inquiry F/U attempt 3 of 3 (cadence: same day → +1d → +2d)',date:'Apr 26'}},
  {id:54,industryId:'equipment_rental',notifTitle:'Inquiry F/U attempt 2 of 3: Hector V.',contact:'Hector V.',rel:'Prospect',type:'follow-up',summary:'Quote sent for skid steer Apr 27, hasn\'t confirmed: attempt 2 of 3 (Same day → +1d → +2d).',callDraft:'Call Hector — quoted on Apr 27 for a Bobcat S650 skid steer for 2-week rental at 422 Commerce. Hasn\'t confirmed; said he was checking with United Rentals. Offer to hold the quote price for 48h + throw in 4 free hours of operator time (worth $200) if booked today.',textDraft:'Hi Hector, John from All Access. Quick FYI — your Bobcat S650 quote ($1,400 for 2 wks) is good through tomorrow. Booking today gets you 4 free hours of operator time. Want me to lock it in? Reply YES and I\'ll send delivery options.',due:'Today',sendAs:'text',earlierItems:[{type:'call',direction:'in',time:'Apr 27, 9:14a',summary:'Inquiry — needs Bobcat skid steer for grading work at 422 Commerce, 2-week rental.'},{type:'sms',direction:'out',time:'Apr 27, 10:30a',text:'Quote sent: Bobcat S650 skid steer, $700/week, $1,400 for 2 weeks. Delivery + bucket included. Quote good for 5 days.'}],serviceEvent:{title:'Quote sent Apr 27 for Bobcat S650 — not confirmed',scheduled:'Inquiry F/U attempt 2 of 3 (cadence: same day → +1d → +2d)',date:'Apr 27'}},
