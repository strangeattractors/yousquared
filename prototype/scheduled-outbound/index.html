  1:{outcome:'booked',label:'Refill confirmed',lines:[{w:'a',t:'Hi, this is Safer Pharmacy calling for Maria. May I confirm your date of birth?'},{w:'p',t:'Sure, March 15th, 1988.'},{w:'a',t:'Thank you Maria. Your Ozempic refill is coming due around April 2nd. Would you like us to ship to your Florida address again?'},{w:'p',t:'Yes please, same address.'},{w:'a',t:'Perfect. By the way, how have you been feeling on the Ozempic? Any side effects?'},{w:'p',t:'The nausea went away after the first couple weeks. Much better now.'},{w:'a',t:'That\'s great to hear. Your refill is confirmed — we\'ll text you the tracking number once it ships. Have a great day!'}]},
  2:{outcome:'booked',label:'Scan scheduled',lines:[{w:'a',t:'Hi, this is Dr. Ali\'s office calling for Sarah. May I confirm your date of birth?'},{w:'p',t:'July 22nd, 1979.'},{w:'a',t:'Thank you Sarah. It\'s been about 6 months since your last CT scan and it\'s time to schedule your routine surveillance scan. How have you been feeling?'},{w:'p',t:'Pretty good. A little tired sometimes but much better than during treatment.'},{w:'a',t:'That\'s wonderful. The fatigue should continue to improve. We have openings next week — Thursday or Friday?'},{w:'p',t:'Thursday works. Morning if possible.'},{w:'a',t:'Thursday at 9:30am. We\'ll send confirmation. Take care Sarah!'}]},
  3:{outcome:'booked',label:'Rental extended',lines:[{w:'a',t:'Hi, this is All Access Equipment calling for Luis. How are you?'},{w:'p',t:'Hey, good. What\'s up?'},{w:'a',t:'Your two scissor lifts at 600 B St are coming up for return on Friday. Want to extend or schedule pickup?'},{w:'p',t:'Yeah we still need them, project got extended. Can we do another two weeks?'},{w:'a',t:'Absolutely, extended through April 16th. Same rate. Anything else you need on site?'},{w:'p',t:'Actually, do you have any boom lifts available? We might need one next week.'},{w:'a',t:'Let me check availability and have John call you back with a quote. Talk soon!'}]},
  4:{outcome:'confirmed',label:'Delivery confirmed',lines:[{w:'a',t:'Hi, this is Safer Pharmacy calling for Carlos. May I confirm your date of birth?'},{w:'p',t:'November 3rd, 1975.'},{w:'a',t:'Thank you Carlos. Just calling to check — your Ozempic delivery went out yesterday. Did everything arrive safely?'},{w:'p',t:'Yeah I got it this morning. All good.'},{w:'a',t:'Great! Since this is your first time on Ozempic, any questions about the pen or storage?'},{w:'p',t:'Do I need to keep it in the fridge the whole time?'},{w:'a',t:'Keep it refrigerated until first use, then room temperature for up to 56 days. Avoid direct sunlight and extreme heat.'},{w:'p',t:'No that\'s helpful, thanks.'},{w:'a',t:'You\'re welcome! Call us anytime if questions come up. Take care!'}]},
  5:{outcome:'booked',label:'Follow-up scheduled',lines:[{w:'a',t:'Hi, this is Dr. Ali\'s office calling for James. May I confirm your date of birth?'},{w:'p',t:'April 8th, 1961.'},{w:'a',t:'Thank you James. Calling to check in after your third immunotherapy cycle. How are you feeling?'},{w:'p',t:'Tired. More than last time. And some nausea.'},{w:'a',t:'I\'m sorry to hear that. Have you noticed any skin rash or itching?'},{w:'p',t:'No rash.'},{w:'a',t:'Any diarrhea more than usual?'},{w:'p',t:'Maybe a little more, but nothing too bad.'},{w:'a',t:'Any shortness of breath?'},{w:'p',t:'No, breathing is fine.'},{w:'a',t:'Good. Vision changes, or yellowing of skin or eyes?'},{w:'p',t:'No, nothing like that.'},{w:'a',t:'The fatigue and mild GI symptoms are common after cycle 3. I\'d recommend scheduling a check-in with Dr. Ali. Would this week work?'},{w:'p',t:'Yeah, can we do Friday?'},{w:'a',t:'Friday at 2pm with Dr. Ali. Stay hydrated and rest. Call us if anything changes.'}]},
  6:{outcome:'confirmed',label:'Setup confirmed',lines:[{w:'a',t:'Hi, this is John from All Access calling for Dave. How\'s it going?'},{w:'p',t:'Hey John. Good, just getting started.'},{w:'a',t:'Did the 40-foot boom get set up OK this morning?'},{w:'p',t:'Yep, your guys dropped it off right at 7. My operator is already up on it.'},{w:'a',t:'Perfect. One question — how high can we safely extend it in wind?'},{w:'p',t:'Good question. Don\'t operate above 28 mph winds. If it gets gusty, lower the platform and wait it out.'},{w:'a',t:'Got it, thanks.'},{w:'a',t:'Anytime. Give us a ring if you need anything else on site!'}]},
  7:{outcome:'booked',label:'Telehealth visit booked',lines:[{w:'a',t:'Hi, this is Ahava Medical calling for David. May I confirm your date of birth?'},{w:'p',t:'June 14th, 1973.'},{w:'a',t:'Thank you David. It\'s been a few months since your visit with Dr. Hoch in November. How have you been feeling?'},{w:'p',t:'Honestly? Not great. I\'ve been meaning to come back in. The diet changes haven\'t really stuck.'},{w:'a',t:'I appreciate your honesty. Lifestyle changes are hard to sustain on your own — that\'s one of the reasons we\'re calling. Would you be open to scheduling a visit to talk through some options?'},{w:'p',t:'Yeah, I think I should. What kind of options?'},{w:'a',t:'Dr. Hoch can discuss different approaches — there are newer treatment options that can help alongside lifestyle changes. We have telehealth appointments this week if that\'s easier.'},{w:'p',t:'Telehealth would be great. What do you have?'},{w:'a',t:'Thursday at 11am with Dr. Hoch via telehealth.'},{w:'p',t:'Perfect, book it.'},{w:'a',t:'You\'re all set. We\'ll send the link by text. Take care David!'}]},
  8:{outcome:'declined',label:'Check-in completed (no booking)',lines:[{w:'a',t:'Hi, this is Ahava Medical calling for Maria. May I confirm your date of birth?'},{w:'p',t:'February 9th, 1981.'},{w:'a',t:'Thank you Maria. It\'s been a while since your last visit with Dr. Fakheri. How have you been feeling?'},{w:'p',t:'I\'m doing fine, thanks. My back has been good.'},{w:'a',t:'Great to hear the back pain stayed resolved. How about in general — anything else going on health-wise?'},{w:'p',t:'No, I\'m good. I\'ve been busy with work and haven\'t had time to come in.'},{w:'a',t:'Completely understand. If you ever want to schedule a routine check-up, you can call us anytime or book online.'},{w:'p',t:'Sure, I\'ll do that when things calm down. Thanks for calling.'},{w:'a',t:'Of course! Take care Maria. We\'re here whenever you need us.'}]},
  9:{outcome:'transfer',label:'Transferred to Dr. Fakheri',lines:[{w:'a',t:'Hi, this is Ahava Medical calling for Rachel. May I confirm your date of birth?'},{w:'p',t:'September 30th, 1987.'},{w:'a',t:'Thank you Rachel. Last time you saw Dr. Fakheri, you mentioned wanting to focus on getting healthier. How\'s that been going?'},{w:'p',t:'Oh, that\'s really thoughtful. The melatonin helped with sleep a lot. But I still don\'t know where to start with the rest.'},{w:'a',t:'That\'s great about the sleep. Dr. Fakheri can put together a personalized wellness plan — nutrition guidance, activity goals, maybe some additional support.'},{w:'p',t:'That sounds helpful. But I have questions — is this covered by insurance? What would it look like?'},{w:'a',t:'Great questions. Would you prefer to speak directly with someone from Dr. Fakheri\'s team?'},{w:'p',t:'Yes, can you transfer me?'},{w:'a',t:'Absolutely. Let me connect you now. One moment...'},{w:'s',t:'📞 Call transferred to Dr. Fakheri\'s office.'}]},
  10:{outcome:'booked',label:'Telehealth + Rx refill booked',lines:[{w:'a',t:'Hi, this is Ahava Medical calling for James. May I confirm your date of birth?'},{w:'p',t:'March 22nd, 1958.'},{w:'a',t:'Thank you James. Your Metformin and Amlodipine prescriptions were due for renewal in February and haven\'t been refilled. Is everything OK?'},{w:'p',t:'Yeah, I know. I just kept putting it off. Things have been hectic.'},{w:'a',t:'I understand. It\'s important to stay on your medications for blood sugar and blood pressure. We can refill right away. Would you also like to schedule a visit with Dr. Hoch? It\'s been about 7 months and he recommended a lab recheck.'},{w:'p',t:'Yeah, you\'re right. Can we do telehealth?'},{w:'a',t:'Wednesday at 3pm with Dr. Hoch via telehealth. And I\'ll process the Rx refills today.'},{w:'p',t:'That works. Thanks for calling — I probably wouldn\'t have gotten around to it otherwise.'},{w:'a',t:'That\'s exactly why we reach out. We\'ll send the link and confirm refills by text. Take care James!'}]},
  11:{outcome:'booked',label:'Post-op check — mild paresthesia, reassured',lines:[{w:'a',t:'Hi, this is Dr. Richardson\'s office calling for Mark. May I confirm your date of birth?'},{w:'p',t:'April 17th, 1968.'},{w:'a',t:'Thank you Mark. Calling to check in the day after your surgery. How are you feeling overall?'},{w:'p',t:'Sore, but OK. Throat is pretty scratchy.'},{w:'a',t:'That\'s normal after surgery. How\'s your voice — any hoarseness beyond the scratchy feeling?'},{w:'p',t:'A little raspy, but I can talk OK.'},{w:'a',t:'Good. Any trouble swallowing water or soft foods?'},{w:'p',t:'Swallowing is fine. Slow but fine.'},{w:'a',t:'Any swelling in your neck that feels like it\'s getting worse, or any difficulty breathing?'},{w:'p',t:'No, neck feels tight but not worse.'},{w:'a',t:'Good. Now — any tingling or numbness in your fingertips, lips, or around your mouth? Muscle cramps or spasms?'},{w:'p',t:'Actually yeah, a bit of tingling in my fingertips this morning. It settled after I took the calcium.'},{w:'a',t:'Thanks for telling me. That tingling can happen and the calcium is the right response. Have you been taking the calcium carbonate three times a day and the calcitriol once daily, as Dr. Richardson prescribed?'},{w:'p',t:'Yes, took both with breakfast.'},{w:'a',t:'Perfect. If the tingling comes back and doesn\'t settle within an hour of a calcium dose — or if you notice muscle cramps, spasms around your mouth, or any new trouble breathing — call us right away and we\'ll get Dr. Richardson on the line. Otherwise keep taking the meds as prescribed. Dr. Richardson will see you in clinic next week to go over pathology.'},{w:'p',t:'Sounds good, thanks.'},{w:'a',t:'Take care Mark. Rest up and we\'ll see you next week.'}]},

// ── Shared Components ──
function StatusBar(){
  return(<div className="status-bar"><span>9:41</span><div className="dynamic-island"/><div className="status-icons"><svg width="17" height="12" viewBox="0 0 17 12"><path d="M1 8h2v4H1zM5 5h2v7H5zM9 2h2v10H9zM13 0h2v12h-2z" fill="var(--primary-text)"/></svg><svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="0" width="22" height="12" rx="3" stroke="var(--primary-text)" strokeWidth="1" fill="none"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="var(--primary-text)" opacity=".4"/><rect x="2" y="2" width="14" height="8" rx="1.5" fill="var(--green)"/></svg></div></div>);
}

function FloatingTabBar({active='inbox',onTabTap}){
  const tabs=[{id:'inbox',icon:()=>I.inbox({s:20}),label:'Inbox'},{id:'contacts',icon:()=>I.contacts({s:20}),label:'Contacts'},{id:'profile',icon:()=>I.settings({s:20}),label:'Settings'}];
  return(
    <div className="tab-bar-area">
      <div className="tab-pill">
        {tabs.map(t=>(
          <div key={t.id} className={`tab-item ${active===t.id?'active':''}`} onClick={()=>onTabTap&&onTabTap(t.id)} style={{cursor:'pointer'}}>
            <span className="tab-icon">{t.icon()}</span>
            <span className="tab-label">{t.label}</span>
          </div>
        ))}
      </div>
      <div className="tab-spacer"/>
      <button className="assistant-btn" style={{background:'var(--surface-darken)',border:'none'}}><span style={{fontSize:22,filter:'none'}}>🌀</span></button>
    </div>
  );
}

function Avatar({name,size=40}){
  const p=name.split(' ');
  return <div className="avatar" style={{width:size,height:size,fontSize:size*.38,background:avatarColor(name)}}>{initials(p[0],p[1])}</div>;
}

function Tag({text,color:c}){
  const col=c||tagColor(text);
  return <span className="tag" style={{color:col,background:`${col}11`,border:`1px solid ${col}30`}}>{text}</span>;
}

function Toggle({on,onToggle}){
  return <div className={`toggle ${on?'on':'off'}`} onClick={onToggle}><div className="toggle-knob"/></div>;
}

// ── Chevron pill component (reusable) ──
function ChevPill({label,options,value,onChange}){
  const[open,setOpen]=useState(false);
  return(<span style={{position:'relative',display:'inline-flex'}}>
    <span onClick={(e)=>{e.stopPropagation();setOpen(!open)}} style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 4px 2px 6px',background:'var(--surface-darken)',borderRadius:10,border:'.5px solid var(--border)',cursor:'pointer'}}>
      <span style={{fontSize:14,fontWeight:600,color:'var(--primary-text)'}}>{value||label}</span>
      <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:16,height:16,borderRadius:8,border:'.75px solid var(--primary-text)',background:'transparent'}}>{I.chevronDown({s:8,c:'var(--primary-text)'})}</span>
    </span>
    {open&&<div style={{position:'absolute',top:'100%',left:0,marginTop:4,background:'var(--bg)',borderRadius:10,border:'.5px solid var(--border)',boxShadow:'0 4px 16px rgba(0,0,0,.12)',zIndex:20,minWidth:140,overflow:'hidden'}}>
      {options.map((o,i)=><div key={i} onClick={(e)=>{e.stopPropagation();onChange(o);setOpen(false)}} style={{padding:'10px 14px',fontSize:14,color:o===value?'var(--accent)':'var(--primary-text)',fontWeight:o===value?600:400,cursor:'pointer',borderBottom:i<options.length-1?'.5px solid var(--border)':'none'}}>{o}</div>)}
    </div>}
  </span>);
}

// ── Industry picker (matches industry-auto-config IndustryPickerSheet) ──
// Full-page parent → child drill-down. `currentId` is the active industry; `onPick`
// receives the chosen child industry id. `onCancel` closes without changing.
function IndustryPickerSheet({currentId,onPick,onCancel}){
  const[drilledParent,setDrilledParent]=useState(null);
  const[customName,setCustomName]=useState('');
  const resolveChildren=(parent)=>parent.children.map(id=>INDUSTRIES[id]).filter(Boolean);

  if(drilledParent){
    const children=resolveChildren(drilledParent);
    return(
      <div className="phone">
        <StatusBar/>
        <div className="nav-header">
          <button className="picker-back-btn" aria-label="Back" onClick={()=>setDrilledParent(null)}>‹</button>
          <div className="nav-title">{drilledParent.name}</div>
          <button className="done-btn" onClick={onCancel}>Done</button>
        </div>
        <div className="list-container">
          <div className="list-section">
            {children.map(ind=>(
              <div key={ind.id} className="list-row" onClick={()=>onPick(ind.id)}>
                <span style={{color:ind.id===currentId?'var(--accent)':'var(--primary-text)',fontWeight:ind.id===currentId?600:400}}>{ind.label}</span>
                {ind.id===currentId&&<span style={{color:'var(--accent)',fontSize:18}}>✓</span>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="phone">
      <StatusBar/>
      <div className="nav-header">
        <div className="nav-title">Industry</div>
        <button className="done-btn" onClick={onCancel}>Done</button>
      </div>
      <div className="list-container">
        <div className="list-section">
          {INDUSTRY_TREE.map(parent=>{
            const children=resolveChildren(parent);
            if(children.length===0)return null;
            const containsCurrent=parent.children.includes(currentId);
            return(
              <div key={parent.id} className="list-row" onClick={()=>setDrilledParent(parent)}>
                <span style={{fontWeight:containsCurrent?600:400}}>{parent.name}</span>
                <span className="list-row-chevron">›</span>
              </div>
            );
          })}
        </div>
        <div className="list-section-header">Other</div>
        <div className="list-section">
          <div className="list-row" style={{cursor:'default'}}>
            <span>Other, specify</span>
          </div>
          <input type="text" className="list-custom-input" placeholder="e.g. Law firm, fitness studio..." value={customName} onChange={e=>setCustomName(e.target.value)}/>
        </div>
      </div>
    </div>
  );
}

                {eAction==='text'?(
                  <><ChevPill label="action" options={['Text','Make an AI call regarding']} value="Text" onChange={v=>setEAction(v==='Text'?'text':'call')}/> {isInbound?'back apologizing & asking how we can help':'a '+eEvent+' reminder'}</>
                ):(
                  <><ChevPill label="action" options={['Text','Make an AI call regarding']} value="Make an AI call regarding" onChange={v=>setEAction(v==='Text'?'text':'call')}/> {eEvent} {isInbound?'follow-up':'check-in'}</>
                )}
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0'}}>
              <span style={{fontSize:15,color:'var(--primary-text)'}}>Automatic</span>

            </div>
          </div>
          <button style={{width:'100%',padding:14,borderRadius:'var(--r-xxl)',border:'1px solid var(--error)',background:'transparent',color:'var(--error)',fontSize:17,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Delete</button>
        </div></div>
        <FloatingTabBar active="profile" onTabTap={id=>{if(id==='inbox'&&onNavigate)onNavigate('todo')}}/>
      </div>
    );
  }

  // ── Main settings list ──
  return(
    <div className="phone"><StatusBar/>
      <div className="nav-header">
        <button className="back-btn">&#8249;</button>
        <span style={{fontSize:17,fontWeight:500,color:'var(--primary-text)',flex:1,textAlign:'center',marginRight:26}}>AI Secretary Settings</span>
      </div>
      <div className="screen-content"><div style={{padding:'0 16px'}}>
        <div className="section-header">General</div>
        <div className="card" style={{marginBottom:16,padding:0,overflow:'hidden'}}>
          <div className="industry-row" onClick={()=>setShowPicker(true)}>
            <span className="industry-row-label">Industry</span>
            <span className="industry-row-value">{industry.label}</span>
            <span className="industry-row-caret" aria-hidden="true">
              <svg width="8" height="12" viewBox="0 0 8 12" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M1.5 4L4 1.5L6.5 4"/>
                <path d="M1.5 8L4 10.5L6.5 8"/>
              </svg>
            </span>
          </div>
        </div>
        <div className="section-header">Identity</div>
        <div className="card" style={{marginBottom:16}}>
          <div style={{padding:'4px 0 10px',borderBottom:'.5px solid var(--border)'}}>
            <div style={{fontSize:13,color:'var(--tertiary-text)',marginBottom:2}}>AI Name</div>
            <div style={{fontSize:17,color:'var(--primary-text)'}}>Brooke</div>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'.5px solid var(--border)'}}>
            <span style={{fontSize:15,color:'var(--primary-text)'}}>AI Voice</span>
            <span style={{fontSize:15,color:'var(--accent)',fontWeight:500}}>Brooke &#8597;</span>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0 4px'}}>
            <span style={{fontSize:15,color:'var(--primary-text)'}}>AI Title</span>
            <span style={{fontSize:15,color:'var(--accent)',fontWeight:500}}>Secretary &#8597;</span>
          </div>
        </div>
        <div className="section-header">Custom Instructions</div>
        <div className="card" style={{marginBottom:16}}>
          <div style={{padding:'4px 0 10px',borderBottom:'.5px solid var(--border)'}}>
            <div style={{fontSize:13,color:'var(--tertiary-text)',marginBottom:2}}>Further Guidelines</div>
            <div style={{fontSize:15,color:'var(--secondary-text)'}}>Instructions to change the behaviour of your Secretary</div>
          </div>
          <div style={{padding:'10px 0 4px'}}>
            <div style={{fontSize:13,color:'var(--tertiary-text)',marginBottom:2}}>FAQ</div>
            <div style={{fontSize:15,color:'var(--primary-text)',lineHeight:1.4}}>Q: What's your website?{'\n'}A: www.yousquared.ai</div>
          </div>
        </div>
        <div className="section-header">Scenarios</div>
        <div className="card" style={{marginBottom:16}}>
          {scenarios.length===0&&<div style={{padding:'12px 0',fontSize:14,color:'var(--secondary-text)'}}>No scenarios yet — tap "Add Scenario" to get started.</div>}
          {scenarios.map((sc,i)=>{
            const hasCadence=Array.isArray(sc.cadence)&&sc.cadence.length>0;
            const attempts=sc.maxAttempts||sc.defaultAttempts||3;
            const visibleCadence=hasCadence?sc.cadence.slice(0,attempts).join(' → '):null;
            return(
            <div key={sc.id} onClick={()=>{setEditing(sc);setERel(sc.rel);setEEvent(sc.event);setETiming(sc.timing);setEAction(sc.action);setEAuto(sc.auto);setEDir(sc.direction)}}
              style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',padding:'10px 0',borderBottom:i<scenarios.length-1?'.5px solid var(--border)':'none',cursor:'pointer'}}>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:600,color:'var(--primary-text)',marginBottom:2}}>{sc.condition}</div>

                  <div style={{fontSize:13,color:'var(--primary-text)',marginBottom:4,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <span>{visibleCadence}</span>
                    <span style={{color:'var(--tertiary-text)'}}>·</span>
                    <span onClick={(e)=>{
                      e.stopPropagation();
                      setScenarios(prev=>prev.map(s=>s.id===sc.id?{...s,maxAttempts:(attempts%5)+1}:s));
                    }} style={{display:'inline-flex',alignItems:'center',gap:3,padding:'1px 4px 1px 6px',background:'var(--surface-darken)',borderRadius:10,border:'.5px solid var(--border)',cursor:'pointer'}}>
                      <span style={{fontSize:13,fontWeight:600,color:'var(--primary-text)'}}>max {attempts}</span>
                      <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:14,height:14,borderRadius:7,border:'.75px solid var(--primary-text)'}}>{I.chevronDown({s:8,c:'var(--primary-text)'})}</span>
                    </span>
                    <span style={{fontSize:13,color:'var(--secondary-text)'}}>attempts</span>
                  </div>
                )}
                <div style={{fontSize:14,color:'var(--secondary-text)',lineHeight:1.4}}>{sc.instructions}</div>
                <div style={{marginTop:4}}>
                  <span style={{fontSize:11,fontWeight:600,padding:'2px 6px',borderRadius:4,background:sc.auto?'#E8F5E9':'var(--surface-darken)',color:sc.auto?'var(--green)':'var(--tertiary-text)',textTransform:'uppercase',letterSpacing:.3}}>{sc.auto?'Automatic':'Manual'}</span>
                </div>
              </div>
              <span style={{display:'flex',marginTop:2,marginLeft:8,opacity:.4}}>{I.edit({s:16,c:'var(--primary-text)'})}</span>
            </div>
            );
          })}
          <div onClick={()=>setAdding(true)} style={{padding:'12px 0 4px',display:'flex',alignItems:'center',gap:6,cursor:'pointer'}}>
            <span style={{display:'flex',color:'var(--accent)'}}>{I.plus({s:18,c:'var(--accent)'})}</span>
            <span style={{fontSize:15,fontWeight:500,color:'var(--accent)'}}>Add Scenario</span>
          </div>
        </div>
        <div style={{height:80}}/>
      </div></div>
      <FloatingTabBar active="profile" onTabTap={id=>{if(id==='inbox'&&onNavigate)onNavigate('todo')}}/>
    </div>
  );
}

// ── Screen 4: To-Do / Outbox ──
function TodoScreen({onNavigate,industryId}){
  const[filter,setFilter]=useState('todo');
  const[openThread,setOpenThread]=useState(null);
  const[threadSendAs,setThreadSendAs]=useState('text'); // 'text' or 'call'
  const[draftEditing,setDraftEditing]=useState(false);
  const[editedDraft,setEditedDraft]=useState('');
  const[sentIds,setSentIds]=useState([]);
  const[simState,setSimState]=useState(null); // null|'loading'|'playing'|'done'
  const[simLines,setSimLines]=useState([]);
  const[simIdx,setSimIdx]=useState(0);
  // Filter TODOs to current industry — drives the inbox + the post-send simulation list.
  const industryTodos=TODOS.filter(t=>t.industryId===industryId);
  const simScrollRef=useRef(null);
  const pending=industryTodos.filter(t=>!sentIds.includes(t.id));
  const sent=industryTodos.filter(t=>sentIds.includes(t.id));

  // ── Full-page thread view (pushed on NavigationStack) ──
  const triggerRef=useRef(null);
  const scrollRef=useRef(null);
  // Auto-scroll to trigger event on open
  React.useEffect(()=>{
    if(openThread&&triggerRef.current){
      // Wait for DOM to render fully, then scroll trigger event to top of scroll area
      const t=setTimeout(()=>{
        if(triggerRef.current&&scrollRef.current){
          const containerRect=scrollRef.current.getBoundingClientRect();
          const elRect=triggerRef.current.getBoundingClientRect();
          // Scroll so the event card sits at the BOTTOM of the visible scroll area
          // (right above the draft bar), not at the top
          const containerH=containerRect.height;
          const elH=triggerRef.current.offsetHeight;
          const dateH=30; // date pill above the event
          const targetOffset=elRect.top-containerRect.top-(containerH-elH-dateH);
          scrollRef.current.scrollTop+=targetOffset;
        }
      },150);
      return ()=>clearTimeout(t);
    }
  },[openThread]);
  // Simulation playback — reveal lines one by one
  React.useEffect(()=>{
    if(simState==='playing'&&openThread){
      const tx=TRANSCRIPTS[openThread.id];
      const lines=tx._simLines||tx.lines;
      if(tx&&simIdx<lines.length){
        const line=lines[simIdx];
        const delay=line.w==='t'?800:line.w==='s'?1500:1200;
        const t=setTimeout(()=>{
          setSimLines(l=>[...l,lines[simIdx]]);
          setSimIdx(i=>i+1);
          if(simScrollRef.current)simScrollRef.current.scrollTop=simScrollRef.current.scrollHeight;
        },delay);
        return()=>clearTimeout(t);
      }else if(tx&&simIdx>=lines.length){
        setSimState('done');
        setSentIds(p=>[...p,openThread.id]);
      }
    }
  },[simState,simIdx,openThread]);

  // ── Simulation view ──
  if(openThread&&simState){
    const tx=TRANSCRIPTS[openThread.id]||{};
    const isCall=threadSendAs==='call';
    return(
      <div className="phone">
        <StatusBar/>
        <div style={{display:'flex',alignItems:'center',padding:'2px 16px 6px',gap:10,borderBottom:'.5px solid var(--border)',flexShrink:0}}>
          <button className="back-btn" style={{padding:0}} onClick={()=>{setSimState(null);setSimLines([]);setSimIdx(0);}}>&#8249;</button>
          <Avatar name={openThread.contact} size={36}/>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:600,color:'var(--primary-text)'}}>{openThread.contact}</div>
            <div style={{fontSize:12,color:simState==='loading'?'var(--accent)':simState==='playing'?'var(--green)':'var(--secondary-text)'}}>{simState==='loading'?(isCall?'Placing AI call...':'Sending text...'):(simState==='playing'?(isCall?'AI call in progress...':'Conversation in progress...'):'Completed')}</div>
          </div>
          {simState==='playing'&&<div style={{width:10,height:10,borderRadius:5,background:'var(--green)',animation:'pulse 1.5s infinite'}}/>}
        </div>
        {simState==='loading'?(
          <div className="screen-content" style={{display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:40,marginBottom:16}}>{isCall?'📞':'📱'}</div>
              <div style={{fontSize:17,fontWeight:600,color:'var(--primary-text)',marginBottom:4}}>{isCall?'Placing AI call...':'Sending text...'}</div>
              <div style={{fontSize:14,color:'var(--secondary-text)'}}>{openThread.contact}</div>
            </div>
          </div>
        ):(
          <div className="screen-content" ref={simScrollRef} style={{background:'var(--bg)',padding:'12px 16px'}}>
            {simLines.map((line,i)=>{
              const isAI=line.w==='a';
              const isSys=line.w==='s';
              const isText=line.w==='t';
              if(isSys) return <div key={i} style={{textAlign:'center',padding:'8px 0',fontSize:13,color:'var(--secondary-text)',fontStyle:'italic',animation:'fadeIn .3s ease'}}>{line.t}</div>;
              if(isText) return(
                <div key={i} style={{display:'flex',justifyContent:'flex-end',marginBottom:8,animation:'fadeIn .3s ease'}}>
                  <div style={{maxWidth:'85%',padding:'10px 14px',borderRadius:'16px 16px 4px 16px',background:'var(--surface-darken)',border:'.5px solid var(--border)',color:'var(--primary-text)',fontSize:15,lineHeight:1.4}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--tertiary-text)',marginBottom:4,textTransform:'uppercase'}}>Text sent</div>
                    {line.t}
                  </div>
                </div>
              );
              return(
                <div key={i} style={{display:'flex',justifyContent:isAI?'flex-start':'flex-end',marginBottom:8,animation:'fadeIn .3s ease'}}>
                  <div style={{maxWidth:'80%',padding:'10px 14px',borderRadius:isAI?'16px 16px 16px 4px':'16px 16px 4px 16px',background:isAI?'var(--surface-dark)':'var(--accent)',color:isAI?'var(--primary-text)':'#fff',fontSize:15,lineHeight:1.4}}>
                    {line.t}
                  </div>
                </div>
              );
            })}
            {simState==='done'&&tx.label&&(
              <div style={{textAlign:'center',padding:'16px 0'}}>
                <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 16px',borderRadius:20,background:tx.outcome==='booked'?'#E8F5E9':tx.outcome==='transfer'?'#E3F2FD':'var(--surface-darken)'}}>
                  <span style={{fontSize:14}}>{tx.outcome==='booked'?'✅':tx.outcome==='transfer'?'📞':'👋'}</span>
                  <span style={{fontSize:14,fontWeight:600,color:tx.outcome==='booked'?'var(--green)':tx.outcome==='transfer'?'var(--blue)':'var(--secondary-text)'}}>{tx.label}</span>
                </div>
                <div style={{marginTop:12}}>
                  <button className="btn-secondary" style={{width:'auto',padding:'10px 24px',fontSize:14}} onClick={()=>{setSimState(null);setSimLines([]);setSimIdx(0);setOpenThread(null)}}>Back to To-Do</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  if(openThread){
    return(
      <div className="phone">
        <StatusBar/>
        {/* Compact header: back + name + tag */}
        <div style={{display:'flex',alignItems:'center',padding:'2px 16px 6px',gap:10,borderBottom:'.5px solid var(--border)',flexShrink:0}}>
          <button className="back-btn" style={{padding:0}} onClick={()=>{setOpenThread(null);setDraftEditing(false)}}>‹</button>
          <Avatar name={openThread.contact} size={36}/>
          <div style={{flex:1}}>
            <div style={{fontSize:17,fontWeight:600,color:'var(--primary-text)'}}>{openThread.displayContact||openThread.contact}</div>
            <div style={{fontSize:12,color:'var(--secondary-text)'}}>{openThread.rel}</div>
          </div>
          <Tag text={openThread.rel}/>
        </div>

        {/* Thread content — ONLY thread items scroll */}
        <div className="screen-content" ref={scrollRef} style={{background:'var(--bg)',padding:'0 16px'}}>
          {/* Earlier interactions */}
          <div style={{textAlign:'center',padding:'8px 0 10px'}}>
            <span style={{fontSize:12,fontWeight:500,color:'var(--tertiary-text)',background:'var(--surface-darken)',padding:'4px 12px',borderRadius:12}}>Earlier</span>
          </div>
          {(openThread.earlierItems||[{type:'call',direction:'in',time:'2:13p',summary:openThread.prevCall}]).map((item,i)=>(
            <div key={'e'+i} style={{marginBottom:12,...(item.direction==='out'?{marginLeft:32}:{marginRight:32})}}>
              <div style={{padding:'12px 14px',background:item.direction==='out'?'var(--surface-darken)':'var(--surface-dark)',borderRadius:'var(--r-lg)',border:'.5px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:item.text?0:6}}>
                  <span style={{display:'flex'}}>{item.type==='call'?I.callReceive({s:18,c:'var(--primary-text)'}):I.sms({s:18,c:'var(--primary-text)'})}</span>
                  <span style={{fontSize:17,fontWeight:600,color:'var(--primary-text)'}}>{item.type==='call'?'Call':'Text'}</span>
                  <span style={{fontSize:12,color:'var(--secondary-text)',marginLeft:'auto'}}>{item.time}</span>
                </div>
                {item.summary&&<div style={{fontSize:15,color:'var(--primary-text)',fontStyle:'italic',lineHeight:1.4}}>{item.summary}</div>}
                {item.text&&<div style={{fontSize:15,color:'var(--primary-text)',fontStyle:'italic',lineHeight:1.4,marginTop:4}}>{item.text}</div>}
              </div>
            </div>
          ))}
          {/* Service event — bold title + scheduled line */}
          {openThread.serviceEvent&&(<>
            <div style={{textAlign:'center',padding:'4px 0 10px'}}>
              <span style={{fontSize:12,fontWeight:500,color:'var(--tertiary-text)',background:'var(--surface-darken)',padding:'4px 12px',borderRadius:12}}>{openThread.serviceEvent.date}</span>
            </div>
            <div style={{marginBottom:12}} ref={triggerRef}>
              <div style={{padding:'12px 14px',background:'var(--surface-dark)',borderRadius:'var(--r-lg)',border:'.5px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{display:'flex'}}>{I.calendar({s:18,c:'var(--primary-text)'})}</span>
                  <span style={{fontSize:17,fontWeight:600,color:'var(--primary-text)'}}>Event</span>
                </div>
                <div style={{fontSize:15,fontWeight:600,color:'var(--primary-text)',lineHeight:1.4}}>{openThread.serviceEvent.title}</div>
                <div style={{fontSize:14,color:'var(--secondary-text)',lineHeight:1.4,marginTop:2}}>{openThread.serviceEvent.scheduled}</div>
              </div>
            </div>
          </>)}
          {/* Recent items after the trigger event */}
          {openThread.recentItems&&openThread.recentItems.map((item,i)=>{
            const isOut=item.direction==='out';
            const isAICall=item.type==='call'&&isOut;
            return(
            <div key={i} style={{marginBottom:12,...(isOut?{marginLeft:32}:{marginRight:32})}}>
              <div style={{padding:'12px 14px',background:isOut?'var(--surface-darken)':'var(--surface-dark)',borderRadius:'var(--r-lg)',border:'.5px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:item.text?0:6}}>
                  <span style={{display:'flex'}}>{isAICall?I.outbound({s:18,c:'var(--primary-text)'}):item.type==='call'?I.callReceive({s:18,c:'var(--primary-text)'}):I.sms({s:18,c:'var(--primary-text)'})}</span>
                  <span style={{fontSize:17,fontWeight:600,color:'var(--primary-text)'}}>{isAICall?'AI Call':item.type==='call'?'Call':'Text'}</span>
                  <span style={{fontSize:12,color:'var(--secondary-text)',marginLeft:'auto'}}>{item.time}</span>
                </div>
                {item.summary&&<div style={{fontSize:15,color:'var(--primary-text)',fontStyle:'italic',lineHeight:1.4}}>{item.summary}</div>}
                {item.text&&<div style={{fontSize:15,color:'var(--primary-text)',fontStyle:'italic',lineHeight:1.4,marginTop:4}}>{item.text}</div>}
              </div>
            </div>
            );
          })}
          <div style={{height:8}}/>
        </div>

        {/* Draft bar — FIXED, does not scroll */}
        <div style={{padding:'6px 16px 4px',borderTop:'.5px solid var(--border)',background:'var(--bg)',flexShrink:0}}>
          {(() => {
            const activeDraft = threadSendAs==='call' ? openThread.callDraft : openThread.textDraft;
            const isCall = threadSendAs==='call';
            return (
            <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
              <div style={{flex:1,padding:'8px 10px',background:'var(--input-bg)',borderRadius:24,border:'.5px solid var(--input-stroke)',maxHeight:draftEditing?140:88,overflow:'auto'}}
                onDoubleClick={()=>{if(!draftEditing){setDraftEditing(true);setEditedDraft(activeDraft)}}}
              >
                {!draftEditing?(
                  <div>
                    <div style={{fontSize:15,color:'var(--secondary-text)',lineHeight:1.6}}>
                      <span
                        onClick={(e)=>{e.stopPropagation();setThreadSendAs(isCall?'text':'call');setDraftEditing(false);setEditedDraft('')}}
                        style={{display:'inline-flex',alignItems:'center',gap:3,padding:'1px 4px 1px 5px',background:'var(--surface-darken)',borderRadius:10,border:'.5px solid var(--border)',cursor:'pointer',verticalAlign:'middle',marginRight:4}}
                      >
                        <span style={{display:'flex'}}>{isCall ? I.outbound({s:13,c:'var(--primary-text)'}) : I.sms({s:13,c:'var(--primary-text)'})}</span>
                        <span style={{fontSize:12,fontWeight:600,color:'var(--primary-text)',lineHeight:'18px'}}>{isCall?'AI Call':'Text'}</span>
                        <span style={{display:'flex',alignItems:'center',justifyContent:'center',width:18,height:18,borderRadius:9,border:'.75px solid var(--primary-text)',background:'transparent',marginLeft:1}}>{I.chevronDown({s:10,c:'var(--primary-text)'})}</span>
                      </span>
                      {activeDraft}
                    </div>
                    <div style={{marginTop:4,display:'inline-flex',alignItems:'center',padding:'2px 8px',borderRadius:10,background:'rgba(255,255,255,.65)',boxShadow:'0 .5px 1.5px rgba(0,0,0,.12)',border:'.5px solid rgba(0,0,0,.08)'}}>
                      <span style={{fontSize:11,fontWeight:500,color:'rgba(0,0,0,.45)'}}>Double-tap to edit</span>
                    </div>
                  </div>
                ):(
                  <textarea autoFocus value={editedDraft} onChange={e=>setEditedDraft(e.target.value)}
                    style={{width:'100%',border:'none',background:'transparent',outline:'none',fontSize:15,fontFamily:'inherit',color:'var(--primary-text)',resize:'none',lineHeight:1.4}} rows={3}/>
                )}
              </div>
              <div style={{width:36,height:36,borderRadius:18,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,marginBottom:2}}
                onClick={()=>{
                  // Start simulation
                  const tx=TRANSCRIPTS[openThread.id];
                  if(tx){
                    setSimState('loading');
                    setSimLines([]);
                    setSimIdx(0);
                    // If text mode for healthcare, prepend text + callback flow
                    const isTextMode=threadSendAs==='text';
                    const isHealthcare=['primary_care','dental','mental_health','oncology','pharmacy','gastroenterology','surgery'].includes(openThread.industryId);
                    if(isTextMode&&isHealthcare){
                      const textDraft=openThread.textDraft;
                      tx._simLines=[{w:'t',t:textDraft},{w:'s',t:'✓ Text delivered'},{w:'s',t:'📞 '+openThread.contact+' is calling back...'},{w:'s',t:'AI answering inbound call'},...tx.lines];
                    }else{
                      tx._simLines=tx.lines;
                    }
                    setTimeout(()=>{setSimState('playing')},isTextMode?1500:2000);
                  }else{
                    setSentIds(p=>[...p,openThread.id]);setOpenThread(null);
                  }
                }}>
                {I.arrowUp({s:16,c:'#fff'})}
              </div>
            </div>
            );
          })()}
        </div>

        {/* iOS Keyboard — FIXED, does not scroll */}
        <div style={{background:'#D1D3D9',padding:'6px 3px 2px',flexShrink:0}}>
          {[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['⇧','Z','X','C','V','B','N','M','⌫']].map((row,ri)=>(
            <div key={ri} style={{display:'flex',justifyContent:'center',gap:ri===2?4:5,marginBottom:5}}>
              {row.map((k,ki)=>{
                const isSpecial=k==='⇧'||k==='⌫';
                return <div key={ki} style={{width:isSpecial?38:30,height:36,background:'#fff',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',fontSize:isSpecial?16:15,fontWeight:400,color:'#000',boxShadow:'0 1px 0 rgba(0,0,0,.3)',fontFamily:'-apple-system,sans-serif'}}>{k}</div>;
              })}
            </div>
          ))}
          <div style={{display:'flex',gap:5,justifyContent:'center'}}>
            <div style={{width:75,height:36,background:'#ADB3BC',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#000',boxShadow:'0 1px 0 rgba(0,0,0,.25)'}}>123</div>
            <div style={{width:30,height:36,background:'#ADB3BC',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#000'}}>🌐</div>
            <div style={{flex:1,height:36,background:'#fff',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#888',boxShadow:'0 1px 0 rgba(0,0,0,.3)'}}>space</div>
            <div style={{width:75,height:36,background:'#ADB3BC',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'#000',boxShadow:'0 1px 0 rgba(0,0,0,.25)'}}>return</div>
          </div>
          <div style={{height:4}}/>
        </div>
      </div>
    );
  }

  // ── Inbox list view ──
  return(
    <div className="phone">
      <StatusBar/>
      <div className="screen-content">
        {/* Search bar — right at top, no title */}
        <div style={{padding:'8px 0 8px'}}>
          <div className="search-bar">
            <span className="search-icon" style={{color:'var(--tertiary-text)',display:'flex'}}>{I.search({s:16,c:'var(--tertiary-text)'})}</span>
            <input placeholder="Search in 'To-Do'..."/>
          </div>
        </div>
        {/* Filter pills — horizontal scroll, single row */}
        <div style={{display:'flex',gap:8,padding:'4px 16px 12px',overflowX:'auto',overflowY:'hidden',flexWrap:'nowrap',WebkitOverflowScrolling:'touch',scrollbarWidth:'none',msOverflowStyle:'none'}} className="pill-scroll">
          {[{k:'inbox',l:'Inbox',badge:12},{k:'todo',l:'To-Do',badge:pending.length},{k:'unread',l:'Unread',badge:3},{k:'missed',l:'Missed',badge:1},{k:'urgent',l:'Urgent',badge:4}].map(f=>(
            <button key={f.k} className={`pill ${filter===f.k?'active':'inactive'}`} onClick={()=>setFilter(f.k)} style={{position:'relative',whiteSpace:'nowrap',flexShrink:0}}>
              {f.l}
              {f.badge?<span style={{position:'absolute',top:-6,right:-4,fontSize:10,fontWeight:700,minWidth:16,height:16,lineHeight:'16px',textAlign:'center',background:'var(--accent)',color:'#fff',borderRadius:8,padding:'0 4px'}}>{f.badge}</span>:null}
            </button>
          ))}
        </div>

        {filter==='todo'&&(
          <div>
            {industryTodos.length===0&&(
              <div style={{padding:'40px 24px',textAlign:'center'}}>
                <div style={{fontSize:14,color:'var(--secondary-text)'}}>No To-Dos for this industry yet.</div>
              </div>
            )}
            {industryTodos.filter(t=>!sentIds.includes(t.id)).map(todo=>{
              const isUrgent=todo.due==='Today';
              return(
              <div className="contact-cell" key={todo.id} onClick={()=>{setOpenThread(todo);setThreadSendAs(todo.sendAs);setDraftEditing(false);setEditedDraft('')}}>
                <div className="contact-cell-icon" style={{background:'var(--surface-darken)'}}>
                  {I.outbound({s:20,c:'var(--primary-text)'})}
                </div>
                <div className="contact-cell-body">
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span className="contact-cell-name unread">{todo.displayContact||todo.contact}</span>
                    {isUrgent&&<span style={{display:'flex',color:'var(--error)'}}>{I.bell({s:14,c:'var(--error)'})}</span>}
                    <span className="todo-badge">To-Do</span>
                    <span style={{flex:1}}/>
                    <span className="contact-cell-date unread">{todo.due}</span>
                  </div>
                  <div className="contact-cell-preview unread" style={{marginTop:1}}>
                    {todo.summary}
                  </div>
                </div>
              </div>
              );
            })}
            {/* Sent items show as read */}
            {industryTodos.filter(t=>sentIds.includes(t.id)).map(todo=>(
              <div className="contact-cell" key={todo.id}>
                <div className="contact-cell-icon" style={{background:'var(--surface-darken)'}}>
                  {I.outbound({s:20,c:'var(--tertiary-text)'})}
                </div>
                <div className="contact-cell-body">
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span className="contact-cell-name read" style={{textDecoration:'line-through',color:'var(--tertiary-text)'}}>{todo.displayContact||todo.contact}</span>
                    <span style={{flex:1}}/>
                    <span className="contact-cell-date read">Sent</span>
                  </div>
                  <div className="contact-cell-preview read">Sent just now</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* No bottom sheet — tapping a cell pushes a full-page thread view above */}
      <FloatingTabBar active="inbox" onTabTap={id=>{if(id==='profile'&&onNavigate)onNavigate('scenarios')}}/>
    </div>
  );
}

// ── Screen 5: Push Notifications ──
// Derives notif cards from the same TODOS list as the To-Do screen so they
// stay in lockstep with the industry filter.
function NotifScreen({industryId}){
  const notifs=TODOS.filter(t=>t.industryId===industryId).slice(0,6).map((t,i)=>({
    title:t.notifTitle||t.contact,
    body:t.summary,
    time:i===0?'now':`${i*3+2}m ago`,
  }));
  return(
    <div className="phone" style={{background:'#000'}}>
      <StatusBar/>
      <div style={{padding:'20px 0 0'}}>
        <div style={{fontSize:72,fontWeight:700,color:'#fff',textAlign:'center',letterSpacing:-2,lineHeight:1}}>9:41</div>
        <div style={{fontSize:17,color:'rgba(255,255,255,.7)',textAlign:'center',marginTop:4,marginBottom:32}}>Monday, March 31</div>
      </div>
      <div style={{padding:'0 16px',flex:1}}>
        {notifs.length===0&&(
          <div style={{textAlign:'center',color:'rgba(255,255,255,.5)',fontSize:14,marginTop:40}}>No notifications for this industry yet.</div>
        )}
        {notifs.map((n,i)=>(
          <div className="notif-card" key={i}>
            <div className="notif-header">
              <div className="notif-app-icon">Y²</div>
              <span style={{fontSize:12,color:'rgba(255,255,255,.5)',fontWeight:500}}>YouSquared</span>
              <span style={{fontSize:12,color:'rgba(255,255,255,.35)',marginLeft:'auto'}}>{n.time}</span>
            </div>
            <div style={{fontSize:15,fontWeight:600,color:'#fff',marginBottom:2}}>{n.title}</div>
            <div style={{fontSize:14,color:'rgba(255,255,255,.7)',lineHeight:1.35}}>{n.body}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ──
function App(){
  const[screen,setScreen]=useState('todo');
  // Industry is global so switching it from Settings instantly re-filters To-Do + Notifications.
  // Default 'pharmacy' matches the pre-existing prototype framing.
  const[industryId,setIndustryId]=useState('primary_care');
  // Per-industry scenarios state — edits persist across switches (mirrors industry-auto-config App).
  const[scenariosByIndustry,setScenariosByIndustry]=useState({});
  const industry=INDUSTRIES[industryId];
  const scenarios=scenariosByIndustry[industry.id]??industry.auto_config_scenarios??[];
  const setScenarios=(updater)=>{
    setScenariosByIndustry(prev=>{
      const current=prev[industry.id]??industry.auto_config_scenarios??[];
      const next=typeof updater==='function'?updater(current):updater;
      return{...prev,[industry.id]:next};
    });
  };
  const screens=[{key:'todo',label:'To-Do'},{key:'scenarios',label:'Secretary Settings'},{key:'notif',label:'Push Notifications'}];
  return(
    <>
      <div style={{textAlign:'center',padding:'8px 0 0'}}>
        <div style={{fontSize:20,fontWeight:700,color:'#fff',letterSpacing:'-.5px'}}>YouSquared</div>
        <div style={{fontSize:12,color:'#888',marginTop:2}}>Scheduled Outbound & Contact Events · <span style={{color:'#FF8370',fontWeight:600}}>{industry.label}</span></div>
      </div>
      <div className="nav-bar">
        {screens.map(s=>(<button key={s.key} className={`nav-btn ${screen===s.key?'active':''}`} onClick={()=>setScreen(s.key)}>{s.label}</button>))}
      </div>
      {screen==='scenarios'&&<ScenariosScreen onNavigate={setScreen} industry={industry} scenarios={scenarios} setScenarios={setScenarios} onChangeIndustry={setIndustryId}/>}
      {screen==='todo'&&<TodoScreen onNavigate={setScreen} industryId={industryId}/>}
      {screen==='notif'&&<NotifScreen industryId={industryId}/>}
      <FeedbackChat/>
      <div style={{position:'fixed',bottom:8,left:12,fontSize:10,color:'var(--error)',maxWidth:220,lineHeight:1.3,zIndex:50}}>All health data in this prototype is illustrative and does not represent any real patients.</div>
    </>
  );
}

// ── Floating Feedback Chatbox ──
function FeedbackChat(){
  const[open,setOpen]=useState(true);
  const[msgs,setMsgs]=useState([{from:'bot',text:'Hey! What do you think of this prototype? Any feedback is welcome.'}]);
  const[input,setInput]=useState('');
  const[sending,setSending]=useState(false);
  const msgsEnd=useRef(null);
  const scrollToBottom=()=>{msgsEnd.current?.scrollIntoView({behavior:'smooth'})};

  const send=async()=>{
    if(!input.trim())return;
    const text=input.trim();
    setMsgs(m=>[...m,{from:'user',text}]);
    setInput('');
    setSending(true);
    try{
      await fetch('https://script.google.com/macros/s/APPS_SCRIPT_ID/exec',{
        method:'POST',mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text,screen:location.href,timestamp:new Date().toISOString()})
      });
    }catch(e){}
    setSending(false);
    setMsgs(m=>[...m,{from:'bot',text:'Thanks! Your feedback has been noted.'}]);
    setTimeout(scrollToBottom,100);
  };

  return(<>
    {/* Floating bubble */}
    {!open&&(
      <div onClick={()=>{setOpen(true);setTimeout(scrollToBottom,200)}}
        style={{position:'fixed',bottom:24,right:24,width:52,height:52,borderRadius:26,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,.3)',zIndex:100}}>
        {I.messages({s:24,c:'#fff'})}
      </div>
    )}
    {/* Chat panel */}
    {open&&(
      <div style={{position:'fixed',bottom:24,right:24,width:320,maxHeight:440,borderRadius:20,background:'#fff',boxShadow:'0 8px 32px rgba(0,0,0,.25)',zIndex:100,display:'flex',flexDirection:'column',overflow:'hidden',fontFamily:'Inter,sans-serif'}}>
        {/* Header */}
        <div style={{padding:'14px 16px',background:'var(--accent)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:15,fontWeight:600}}>Feedback</span>
          <span onClick={()=>setOpen(false)} style={{cursor:'pointer',fontSize:20,lineHeight:1,opacity:.8}}>×</span>
        </div>
        {/* Messages */}
        <div style={{flex:1,overflow:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:8,maxHeight:280}}>
          {msgs.map((m,i)=>(
            <div key={i} style={{alignSelf:m.from==='user'?'flex-end':'flex-start',maxWidth:'85%',padding:'8px 12px',borderRadius:m.from==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.from==='user'?'var(--accent)':'var(--surface-darken)',color:m.from==='user'?'#fff':'var(--primary-text)',fontSize:14,lineHeight:1.4}}>
              {m.text}
            </div>
          ))}
          <div ref={msgsEnd}/>
        </div>
        {/* Input */}
        <div style={{padding:'10px 12px',borderTop:'1px solid var(--border)',display:'flex',gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send()}}
            placeholder="Type your feedback..."
            style={{flex:1,padding:'8px 12px',borderRadius:20,border:'1px solid var(--border)',fontSize:14,fontFamily:'inherit',outline:'none'}}/>
          <div onClick={send}
            style={{width:34,height:34,borderRadius:17,background:input.trim()?'var(--accent)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
            {I.arrowUp({s:14,c:'#fff'})}
          </div>
        </div>
      </div>
    )}
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
