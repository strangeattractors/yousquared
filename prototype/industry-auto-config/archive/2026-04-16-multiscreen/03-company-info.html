<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3. Company Info — YouSquared</title>
<link rel="stylesheet" href="shared/theme.css" />
<link rel="stylesheet" href="shared/phone-frame.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* Screen-specific: bio text block, listing cards, equipment grid */
  .bio-block { padding: 12px var(--sp-normal); border-top: 0.5px solid var(--border); }
  .bio-label { font-size: 13px; font-weight: 500; color: var(--tertiary-text); margin-bottom: 4px; }
  .bio-text  { font-size: 17px; color: var(--primary-text); line-height: 1.45; white-space: pre-wrap; }

  .listing-card { padding: 12px 0; }
  .listing-card + .listing-card { border-top: 0.5px solid var(--border); }
  .listing-header { font-size: 15px; font-weight: 600; color: var(--primary-text); margin-bottom: 6px; }
  .listing-detail { font-size: 14px; color: var(--secondary-text); line-height: 1.5; }
  .listing-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .listing-meta-tag {
    font-size: 12px; color: var(--secondary-text);
    background: var(--surface-light); padding: 2px 8px; border-radius: 6px;
  }

  .equipment-category { padding: 10px 0; }
  .equipment-category + .equipment-category { border-top: 0.5px solid var(--border); }
  .equipment-category-title {
    font-size: 13px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px;
  }
  .equipment-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0;
  }
  .equipment-name { font-size: 15px; color: var(--primary-text); }
  .equipment-rate { font-size: 13px; color: var(--secondary-text); text-align: right; }

  .add-row {
    margin-top: 8px; padding: 10px 0; text-align: center;
    color: var(--accent); font-size: 15px; font-weight: 500; cursor: pointer;
    border-top: 0.5px solid var(--border);
  }
  .add-row:hover { opacity: 0.7; }

  .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    font-size: 13px; padding: 3px 8px; border-radius: 6px;
  }
  .chip-accepted { background: var(--green-50); color: #2E7D32; }
  .chip-not-accepted { background: var(--red-50); color: #C62828; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.js"></script>
<script type="text/babel" src="shared/industries.js"></script>
<script type="text/babel">
const {
  PhoneFrame, ScreenNav, Badge, FieldRow, PickerRow, NavRow, InfoCard, PrefillBanner,
} = window.UI;

/* ── Section renderers (one per section.type) ─────────── */

function ListSection({ section }) {
  return (
    <div className="field-row">
      <Badge type={section.badge} />
      <div style={{ fontSize: 15, color: 'var(--primary-text)', lineHeight: 1.6 }}>
        {section.content.map((item, i) => (
          <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'baseline' }}>
            <span style={{ color: 'var(--tertiary-text)', fontSize: 12 }}>•</span>
            <span>{item}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function InsuranceSection({ section }) {
  return (
    <div className="field-row" style={{ gap: 8 }}>
      <div style={{ marginBottom: 4 }}>
        <span className="footnote-s text-green">Accepted</span>
      </div>
      <div className="chip-list" style={{ marginBottom: 10 }}>
        {section.accepted.map((ins, i) => (
          <span key={i} className="chip chip-accepted">{ins}</span>
        ))}
      </div>
      <div style={{ marginBottom: 4 }}>
        <span className="footnote-s text-error">Not Accepted</span>
      </div>
      <div className="chip-list">
        {section.notAccepted.map((ins, i) => (
          <span key={i} className="chip chip-not-accepted">{ins}</span>
        ))}
      </div>
    </div>
  );
}

function ListingsSection({ section }) {
  return (
    <div className="field-row" style={{ padding: '4px 16px 4px' }}>
      {section.listings.map((l, i) => (
        <div key={i} className="listing-card">
          <div className="listing-header">{l.address}</div>
          <div className="listing-meta">
            <span className="listing-meta-tag">{l.type}</span>
            <span className="listing-meta-tag">{l.beds}bd / {l.baths}ba</span>
            <span className="listing-meta-tag">{l.sqft} sqft</span>
            <span className="listing-meta-tag">Built {l.year}</span>
          </div>
          <div className="listing-detail" style={{ marginTop: 6 }}>
            <strong style={{ color: 'var(--primary-text)' }}>{l.price}</strong>
          </div>
          <div className="listing-detail">Showings: {l.showing}</div>
          <div className="listing-detail" style={{
            fontSize: 13, color: 'var(--tertiary-text)', marginTop: 2,
          }}>
            Note: {l.notes}
          </div>
        </div>
      ))}
      <div className="add-row">+ Add Listing</div>
    </div>
  );
}

function EquipmentSection({ section }) {
  return (
    <div className="field-row" style={{ padding: '8px 16px 4px' }}>
      {section.categories.map((cat, i) => (
        <div key={i} className="equipment-category">
          <div className="equipment-category-title">{cat.name}</div>
          {cat.items.map((item, j) => (
            <div key={j} className="equipment-row">
              <span className="equipment-name">{item.name}</span>
              <span className="equipment-rate">{item.rate}</span>
            </div>
          ))}
        </div>
      ))}
      <div className="add-row">+ Add Equipment</div>
    </div>
  );
}

function Section({ section }) {
  const renderer = {
    list:      ListSection,
    insurance: InsuranceSection,
    listings:  ListingsSection,
    equipment: EquipmentSection,
  }[section.type] || ListSection;
  const Renderer = renderer;
  return (
    <div className="section">
      <div className="section-title">{section.title}</div>
      <div className="section-card">
        <div className="field-row" style={{ paddingBottom: 4 }}>
          <Badge type={section.badge} />
        </div>
        <Renderer section={section} />
      </div>
    </div>
  );
}

/* ── Main screen ─────────────────────────────────────── */

function CompanyInfoScreen() {
  const industryId = window.getIndustryFromUrl();
  const industry = window.INDUSTRY_LOOKUP[industryId] || { displayName: 'Other', icon: '✦' };
  const data = window.getPrefill(industryId);

  const onChangeIndustry = () => {
    window.location.href = `04-change-industry-confirm.html?industry=${industryId}`;
  };
  const onEditBio = () => {
    window.location.href = `05-edit-bio.html?industry=${industryId}`;
  };

  return (
    <PhoneFrame
      title={data.pageTitle}
      onBack={() => window.location.href = '01-industry-picker.html'}
      rightLabel="Done"
      rightAction={() => alert('Saved. (Prototype — no backend wired up.)')}
    >
      <PrefillBanner industryName={industry.name} />

      {/* General */}
      <div className="section">
        <div className="section-title">General</div>
        <div className="section-card">
          <FieldRow label={data.companyLabel} value={data.companyName} />
          <NavRow label="Adjust pronunciation" onClick={() => {}} />
          <FieldRow label="Job Title" value={data.jobTitle} />
          <FieldRow label="At Work Goes By" value={data.goesBy} />
          <PickerRow
            label="Industry"
            value={industry.displayName}
            icon={industry.icon}
            onClick={onChangeIndustry}
          />
        </div>
      </div>

      {/* Work Bio */}
      <div className="section">
        <div className="section-title">Additional Details</div>
        <div className="section-card">
          <div className="field-row">
            <Badge type={data.workBio.badge} />
            <div className="bio-label">Work Bio</div>
            <div className="bio-text">{data.workBio.text}</div>
          </div>
          <NavRow label="Edit work bio" onClick={onEditBio} />
        </div>
      </div>

      {/* Industry-specific sections */}
      {data.sections.map((section, i) => (
        <Section key={i} section={section} />
      ))}

      <InfoCard
        icon="🛡️"
        title="Information Protected"
        description="Your data is encrypted and only used to train your AI secretary."
      />

      <div style={{ height: 30 }} />
    </PhoneFrame>
  );
}

function App() {
  return (
    <>
      <ScreenNav current="03-company-info.html" />
      <CompanyInfoScreen />
      <div style={{
        textAlign: 'center', marginTop: 16, fontSize: 12,
        color: 'var(--secondary-text)', maxWidth: 420,
      }}>
        <strong>Pre-filled</strong> = ready to use for 85%+ of businesses ·
        <strong> Example</strong> = edit to match yours<br/>
        Try:
        {Object.keys(window.INDUSTRY_PREFILLS)
          .filter(k => !k.startsWith('_'))
          .map((k, i, arr) => (
            <span key={k}>
              {' '}<a href={`03-company-info.html?industry=${k}`}
                 style={{ color: 'var(--accent)' }}>{k}</a>
              {i < arr.length - 1 ? ' ·' : ''}
            </span>
          ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
