<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5. Edit Bio — YouSquared</title>
<link rel="stylesheet" href="shared/theme.css" />
<link rel="stylesheet" href="shared/phone-frame.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  .bio-editor {
    width: 100%; min-height: 240px;
    padding: 14px; border: 1px solid var(--input-stroke);
    background: var(--input-bg); border-radius: var(--r-lg);
    font-size: 17px; color: var(--primary-text);
    font-family: inherit; resize: vertical; line-height: 1.45;
    outline: none;
  }
  .bio-editor:focus { border-color: var(--accent); }
  .char-count {
    text-align: right; font-size: 12px; color: var(--tertiary-text);
    padding-top: 6px;
  }
  .reset-btn {
    margin-top: 12px; background: none; border: none;
    color: var(--accent); font-size: 15px; font-weight: 500;
    cursor: pointer; padding: 6px 0; display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
  }
  .reset-btn:disabled { opacity: 0.4; cursor: default; }
  .status-row {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; background: var(--surface-light);
    border-radius: var(--r); margin-top: 12px;
    font-size: 13px;
  }
  .status-row .dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-row.preset .dot { background: var(--green-500); }
  .status-row.draft  .dot { background: #E65100; }
  .status-row.edited .dot { background: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.js"></script>
<script type="text/babel" src="shared/industries.js"></script>
<script type="text/babel">
const { useState, useMemo } = React;
const { PhoneFrame, ScreenNav, Badge } = window.UI;

/* ── Bio editor — demonstrates the preset/draft/edited state
 * machine used for every editable template field. Same pattern
 * should apply to Products & Services, Pricing, etc.
 * ────────────────────────────────────────────────────────── */

function EditBioScreen() {
  const industryId = window.getIndustryFromUrl();
  const industry = window.INDUSTRY_LOOKUP[industryId] || { name: 'Other', icon: '✦' };
  const data = window.getPrefill(industryId);
  const original = data.workBio.text;
  const originalBadge = data.workBio.badge;  // 'preset' | 'draft'

  const [text, setText] = useState(original);
  const isEdited = text !== original;
  const hasContent = text.trim().length > 0;

  const statusType = isEdited ? 'edited' : originalBadge;
  const statusLabel = {
    preset: 'Pre-filled · ready to use as-is',
    draft:  'Example — edit to match your business',
    edited: 'Edited — your own content',
  }[statusType];

  const save = () => {
    alert(`Saved bio for ${industry.name}.\n\n(Prototype — no backend.)`);
    window.location.href = `03-company-info.html?industry=${industryId}`;
  };

  const reset = () => setText(original);

  return (
    <PhoneFrame
      title="Work Bio"
      onBack={() => window.location.href = `03-company-info.html?industry=${industryId}`}
      rightLabel="Save"
      rightAction={save}
    >
      <div style={{
        padding: '8px 0 14px', fontSize: 13, color: 'var(--secondary-text)', lineHeight: 1.4,
      }}>
        Describe what you do and how you like to talk about it. Your AI secretary uses
        this to introduce your business on calls.
      </div>

      <textarea
        className="bio-editor"
        value={text}
        onChange={e => setText(e.target.value)}
        placeholder="Tell us what makes your business unique…"
      />
      <div className="char-count">
        {text.length} characters · ~{Math.round(text.split(/\s+/).filter(Boolean).length)} words
      </div>

      <div className={`status-row ${statusType}`}>
        <span className="dot" />
        <span>{statusLabel}</span>
        <div style={{ flex: 1 }} />
        <Badge type={isEdited ? null : originalBadge} />
      </div>

      <button
        className="reset-btn"
        onClick={reset}
        disabled={!isEdited}
      >
        ↺ Reset to pre-filled version
      </button>

      <div style={{
        marginTop: 24, padding: 14,
        background: 'var(--accent-surface)',
        border: '1px solid #FFD4CC',
        borderRadius: 'var(--r-lg)',
      }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--primary-text)', marginBottom: 4 }}>
          ✨ Pattern note
        </div>
        <div style={{ fontSize: 13, color: 'var(--secondary-text)', lineHeight: 1.45 }}>
          Every editable pre-filled field follows this same state machine:
          <strong> preset</strong> (green) → <strong>edited</strong> (coral) with a
          reset-to-preset escape hatch. Apply the same pattern to Products & Services,
          Pricing, Hours, etc.
        </div>
      </div>
    </PhoneFrame>
  );
}

function App() {
  return (
    <>
      <ScreenNav current="05-edit-bio.html" />
      <EditBioScreen />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
