<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1. Industry Picker — YouSquared</title>
<link rel="stylesheet" href="shared/theme.css" />
<link rel="stylesheet" href="shared/phone-frame.css" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  /* Screen-specific: iOS grouped list */
  .ios-list { list-style: none; padding: 0; margin: 0; }
  .ios-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px var(--sp-normal);
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    width: 100%; text-align: left;
    border: none; border-bottom: 0.5px solid var(--border);
    font-family: inherit;
  }
  .ios-list-item:last-child { border-bottom: none; }
  .ios-list-item:hover { background: var(--surface-light); }
  .ios-list-icon { font-size: 22px; margin-right: 12px; flex-shrink: 0; }
  .ios-list-label { font-size: 17px; color: var(--primary-text); flex: 1; }
  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--input-bg);
    border-radius: var(--r); margin: 0 var(--sp-normal) 12px;
    border: 1px solid var(--input-stroke);
  }
  .search-wrap input {
    flex: 1; border: none; background: transparent; outline: none;
    font-size: 15px; color: var(--primary-text); font-family: inherit;
  }
  .search-wrap input::placeholder { color: var(--tertiary-text); }
  .custom-input-row {
    padding: 12px var(--sp-normal);
    background: var(--bg);
    border-top: 0.5px solid var(--border);
  }
  .custom-input-row input {
    width: 100%; border: none; background: transparent; outline: none;
    font-size: 17px; color: var(--primary-text); font-family: inherit;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared/components.js"></script>
<script type="text/babel" src="shared/industries.js"></script>
<script type="text/babel">
const { useState, useMemo } = React;
const { PhoneFrame, ScreenNav } = window.UI;

function ParentList({ query, onSelect }) {
  const tree = window.INDUSTRY_TREE;
  const filtered = useMemo(() => {
    if (!query) return tree;
    const q = query.toLowerCase();
    return tree.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.children && p.children.some(c => c.name.toLowerCase().includes(q)))
    );
  }, [query, tree]);

  return (
    <ul className="ios-list">
      {filtered.map(parent => (
        <button key={parent.id} className="ios-list-item" onClick={() => onSelect(parent)}>
          {parent.icon && <span className="ios-list-icon">{parent.icon}</span>}
          <span className="ios-list-label">{parent.name}</span>
          <span className="chevron">›</span>
        </button>
      ))}
    </ul>
  );
}

function ChildList({ parent, onSelect }) {
  return (
    <ul className="ios-list">
      {parent.children.map(child => (
        <button key={child.id} className="ios-list-item" onClick={() => onSelect(child)}>
          {child.icon && <span className="ios-list-icon">{child.icon}</span>}
          <span className="ios-list-label">{child.name}</span>
          <span className="chevron">›</span>
        </button>
      ))}
    </ul>
  );
}

function IndustryPicker() {
  const [selectedParent, setSelectedParent] = useState(null);
  const [query, setQuery] = useState('');
  const [customName, setCustomName] = useState('');

  const goToPrefill = (industryId) => {
    window.location.href = `02-prefill-animation.html?industry=${industryId}`;
  };

  const handleParentSelect = (parent) => {
    if (parent.children) setSelectedParent(parent);
    else goToPrefill(parent.id);
  };

  const handleChildSelect = (child) => goToPrefill(child.id);

  if (selectedParent) {
    return (
      <PhoneFrame
        title={selectedParent.name}
        onBack={() => setSelectedParent(null)}
      >
        <div style={{ margin: '0 -16px' }}>
          <ChildList parent={selectedParent} onSelect={handleChildSelect} />
        </div>
      </PhoneFrame>
    );
  }

  return (
    <PhoneFrame title="Industry" rightLabel="Done" rightAction={() => {
      if (customName.trim()) goToPrefill('other');
    }}>
      <div className="search-wrap" style={{ marginLeft: -4, marginRight: -4 }}>
        <span style={{ color: 'var(--tertiary-text)' }}>🔍</span>
        <input
          placeholder="Search industries"
          value={query}
          onChange={e => setQuery(e.target.value)}
        />
      </div>
      <div style={{ margin: '0 -16px' }}>
        <ParentList query={query} onSelect={handleParentSelect} />
        <div className="section-title" style={{
          padding: '20px 20px 6px', color: 'var(--tertiary-text)',
        }}>Other — specify</div>
        <div className="custom-input-row">
          <input
            placeholder="Describe your industry"
            value={customName}
            onChange={e => setCustomName(e.target.value)}
          />
        </div>
      </div>
    </PhoneFrame>
  );
}

function App() {
  return (
    <>
      <ScreenNav current="01-industry-picker.html" />
      <IndustryPicker />
      <div style={{
        textAlign: 'center', marginTop: 16, fontSize: 12,
        color: 'var(--secondary-text)', maxWidth: 393,
      }}>
        Tap a parent industry to see sub-industries, then tap a leaf
        to continue to the pre-fill animation.
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
