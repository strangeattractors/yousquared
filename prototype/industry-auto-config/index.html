<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YouSquared — Products & Services Sub-fields</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a1a;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px 0}
#root{display:flex;flex-direction:column;align-items:center;gap:16px}

/* ── Design tokens (from Theme.swift + Color+Ext.swift) ── */
:root{
  --accent:#FF8370;--accent-dark:#E07A5F;
  --primary-text:#2D2A26;--secondary-text:#6B6560;--tertiary-text:#9E9893;
  --bg:#FFFFFF;--bg-primary:#FAF8F6;
  --surface-dark:#F8F6F4;--surface-darken:#F0EDEA;--surface-black:#2D2A26;
  --border:#E8E4E0;--input-bg:#F5F2EF;--input-stroke:#D8D4D0;
  --error:#E53935;--green:#43A047;--blue:#1E88E5;
  --draft-blue-bg:rgba(30,136,229,0.12);
  --xs:4px;--sm:10px;--normal:16px;--md:20px;--lg:30px;--xl:40px;
  --r-sm:8px;--r:10px;--r-lg:12px;--r-xl:18px;--r-xxl:30px;
  --btn-h:48px;
}

/* ── Screen navigator ── */
.nav-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:6px 16px;max-width:900px}
.nav-btn{padding:6px 14px;border-radius:var(--r-xxl);border:1.5px solid #555;background:transparent;color:#aaa;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.nav-btn:hover{border-color:#888;color:#fff}
.nav-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Phone frame (iPhone 15 Pro: 393×852) ── */
.phone{width:393px;height:854px;border-radius:44px;background:var(--bg);overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.4);flex-shrink:0;display:flex;flex-direction:column}

/* Status bar */
.status-bar{height:54px;padding:14px 30px 0;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:600;color:var(--primary-text);flex-shrink:0;position:relative}
.dynamic-island{position:absolute;left:50%;transform:translateX(-50%);top:12px;width:126px;height:37px;background:#000;border-radius:22px}
.status-icons{display:flex;gap:4px;align-items:center;font-size:12px;color:var(--primary-text)}

/* Scrollable content */
.screen-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:24px}
.screen-content::-webkit-scrollbar{display:none}

/* Nav header (back + title) */
.nav-header{display:flex;align-items:center;padding:8px var(--normal);gap:8px;min-height:44px;position:relative}
.back-btn{font-size:22px;color:var(--accent);cursor:pointer;background:none;border:none;padding:4px;font-family:inherit;display:flex;align-items:center}
.nav-title{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;font-weight:500;color:var(--primary-text)}

/* Section header (footnoteRU: 13px medium uppercase) — inset matches card margin so header text aligns with card row content */
.section-header{font-size:13px;font-weight:500;text-transform:uppercase;color:var(--secondary-text);margin:0 var(--normal);padding:var(--normal) var(--normal) var(--r-sm);letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.section-info{color:var(--secondary-text);display:inline-flex;align-items:center;cursor:pointer;background:transparent;border:none;padding:0;font-size:inherit;font-family:inherit}
.section-info:hover{color:var(--primary-text)}

/* Card container for a section */
.card{background:var(--surface-dark);border-radius:var(--r-xl);border:.5px solid var(--border);margin:0 var(--normal);overflow:hidden}

/* Row inside a card */
.row{padding:8px var(--normal);padding-top:12px;padding-bottom:10px}
.row-label{font-size:13px;color:var(--secondary-text);display:flex;align-items:center;gap:6px;margin-bottom:4px}
.row-value{font-size:17px;color:var(--primary-text);min-height:22px;line-height:1.35;word-break:break-word}
.row-value.placeholder{color:var(--tertiary-text)}
.row-value.draft{color:var(--secondary-text)}
.row-divider{height:.5px;background:var(--border);margin:0 14px}

/* Draft tag */
.tag-draft{display:inline-flex;align-items:center;height:18px;padding:0 6px;border-radius:4px;font-size:11px;font-weight:600;background:var(--draft-blue-bg);color:var(--blue)}

/* Text input inline (matches SectionTextFieldView) */
.inline-input{padding:4px 0 0;background:transparent;border:none;outline:none;width:100%;font-size:17px;color:var(--primary-text);font-family:inherit;resize:none}
.inline-input::placeholder{color:var(--tertiary-text)}
.inline-input:focus{caret-color:var(--accent)}

/* Product & Services list rows (Call Transfers pattern) */
.item-row{display:flex;align-items:center;gap:var(--normal);padding:0 var(--normal);height:74px;cursor:pointer;background:var(--surface-dark)}
.item-row:hover{background:var(--surface-darken)}
.item-row-content{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;min-width:0}
.item-row-title{font-size:17px;color:var(--primary-text);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-row-title.empty{color:var(--tertiary-text)}
.item-row-subtitle{font-size:13px;color:var(--secondary-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chevron{color:var(--tertiary-text);font-size:18px;line-height:1;flex-shrink:0}
.row-divider-inset{height:.5px;background:var(--border);margin-left:var(--normal);margin-right:0}

/* EditableTextFieldFullScreen (iOS parity — full-screen text editor with nav bar toolbar) */
.editable-nav{display:flex;align-items:center;padding:8px var(--normal);gap:10px;min-height:44px;border-bottom:.5px solid var(--border)}
.editable-nav-back{background:transparent;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px;font-family:inherit;display:flex;align-items:center}
.editable-nav-spacer{flex:1}
.editable-toolbar-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:2px 4px;color:var(--primary-text)}
.editable-toolbar-btn:hover{opacity:.7}
.editable-toolbar-label{font-size:10px;color:var(--primary-text);line-height:1}
.editable-toolbar-save{background:transparent;border:none;color:var(--accent);font-size:17px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 6px}
.editable-body{flex:1;position:relative;overflow:hidden}
.editable-textarea{width:100%;height:100%;border:none;outline:none;padding:12px 14px;font-size:17px;font-family:inherit;color:var(--primary-text);resize:none;background:transparent;line-height:1.45}
.editable-placeholder{position:absolute;top:12px;left:18px;color:var(--tertiary-text);font-size:17px;pointer-events:none;line-height:1.45}

/* Bottom button bar (detail view, Call Transfers pattern) */
.detail-bottom{padding:var(--normal);background:var(--bg);border-top:.5px solid var(--border);display:flex;gap:12px;flex-shrink:0}
.btn-primary{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:var(--btn-h);background:var(--accent);color:#fff;border:none;border-radius:var(--r-xxl);font-size:17px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{background:rgba(255,131,112,0.5);cursor:default}
.btn-tertiary{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:var(--btn-h);background:transparent;color:var(--primary-text);border:1.5px solid var(--primary-text);border-radius:var(--r-xxl);font-size:17px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-tertiary:hover{background:rgba(45,42,38,0.04)}
.btn-tertiary:disabled{color:var(--tertiary-text);border-color:var(--border);cursor:default}
.btn-destructive{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:var(--btn-h);background:transparent;color:var(--error);border:1.5px solid var(--error);border-radius:var(--r-xxl);font-size:17px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-destructive:hover{background:rgba(229,57,53,0.06)}

/* Dismiss (X) button in detail header */
.dismiss-btn{position:absolute;right:var(--normal);top:8px;width:32px;height:32px;background:transparent;border:none;cursor:pointer;color:var(--primary-text);font-size:22px;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0}

/* Empty state (list view when items=[]) */
.empty-state{padding:var(--normal);min-height:74px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px;color:var(--secondary-text);line-height:1.4}

/* Toggle (51×31) */
.toggle{width:51px;height:31px;border-radius:16px;position:relative;cursor:pointer;transition:background .25s;flex-shrink:0;border:none;padding:0}
.toggle.on{background:var(--green)}
.toggle.off{background:var(--border)}
.toggle-knob{width:27px;height:27px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on .toggle-knob{left:22px}
.toggle.off .toggle-knob{left:2px}

/* Settings row (label + trailing control) */
.settings-row{display:flex;align-items:center;gap:var(--normal);padding:12px var(--normal);min-height:var(--cell-h,56px)}
.settings-row-label{flex:1;font-size:17px;color:var(--primary-text)}
.settings-row-trailing{display:flex;align-items:center;gap:6px;color:var(--accent);font-size:17px;cursor:pointer}
.settings-row-trailing .chevron{color:var(--tertiary-text);font-size:14px}
.settings-note{padding:8px var(--normal) 4px;font-size:12px;color:var(--secondary-text);line-height:1.4}

/* Picker sheet option row */
.picker-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;cursor:pointer;font-size:17px;color:var(--primary-text);border-bottom:.5px solid var(--border)}
.picker-row:last-child{border-bottom:none}
.picker-row.selected{color:var(--accent);font-weight:600}
.picker-row .picker-check{color:var(--accent);font-size:18px}
.picker-custom-input{width:100%;padding:12px 14px;border:1px solid var(--input-stroke);border-radius:var(--r);background:var(--input-bg);font-size:17px;font-family:inherit;color:var(--primary-text);outline:none}
.picker-custom-input:focus{border-color:var(--accent)}

/* Bottom sheet (simpleSheet equivalent) */
.sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;z-index:10}
.sheet{width:100%;background:var(--bg);border-radius:28px 28px 0 0;padding:8px var(--md) var(--md);display:flex;flex-direction:column;gap:16px;animation:sheet-in .25s cubic-bezier(.2,.7,.2,1)}
@keyframes sheet-in{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-drag{width:36px;height:5px;border-radius:3px;background:var(--tertiary-text);opacity:.4;margin:0 auto}
.sheet-icon{width:64px;height:64px;border-radius:16px;background:var(--surface-darken);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto}
.sheet-title{font-size:22px;font-weight:600;color:var(--primary-text);text-align:center;line-height:1.25}
.sheet-desc{font-size:17px;color:var(--secondary-text);text-align:center;line-height:1.5;padding:0 var(--sm)}
.sheet-buttons{display:flex;flex-direction:column;gap:10px;padding-top:8px;padding-bottom:12px}
.sheet-buttons .btn-primary,.sheet-buttons .btn-destructive,.sheet-buttons .btn-tertiary{flex:initial;width:100%}

/* Add Listing button */
.add-btn{display:flex;align-items:center;gap:8px;min-height:44px;padding:var(--normal);width:100%;background:transparent;border:none;font-family:inherit;font-size:17px;color:var(--primary-text);cursor:pointer}
.add-btn:hover{background:var(--surface-darken)}
.plus-icon{font-size:20px;line-height:1;color:var(--primary-text)}

/* Info card (data protected) */
.info-card{display:flex;align-items:center;gap:12px;margin:var(--md) var(--normal) 0;padding:12px var(--normal);background:var(--surface-dark);border-radius:var(--r-lg);border:.5px solid var(--border)}
.info-card-icon{font-size:18px;color:var(--green)}
.info-card-text{flex:1}
.info-card-title{font-size:14px;font-weight:500;color:var(--primary-text)}
.info-card-desc{font-size:12px;color:var(--secondary-text);margin-top:2px;line-height:1.35}

/* Industry row (iOS PickerButtonWithId parity: primary label + accent value + up-down chevron) */
.industry-row{padding:12px var(--normal);display:flex;align-items:center;gap:8px;min-height:var(--btn-h)}
.industry-row-label{font-size:17px;color:var(--primary-text);flex-shrink:0}
.industry-row-value{font-size:17px;color:var(--accent);flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.industry-row-caret{color:var(--accent);flex-shrink:0;display:inline-flex}

/* Scenario list row (Secretary Settings) */
.scenario-row{padding:12px var(--normal);display:flex;gap:8px;cursor:pointer;border-bottom:.5px solid var(--border)}
.scenario-row:last-child{border-bottom:none}
.scenario-row:hover{background:var(--surface-dark)}
.scenario-row-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.scenario-condition{font-size:15px;font-weight:600;color:var(--primary-text);line-height:1.3}
.scenario-instructions{font-size:14px;color:var(--secondary-text);line-height:1.35}
.scenario-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px;margin-top:4px}
.scenario-badge.auto{background:#E8F5E9;color:var(--green)}
.scenario-badge.manual{background:var(--surface-darken);color:var(--tertiary-text)}
.scenario-edit-icon{margin-top:2px;margin-left:8px;opacity:.4;color:var(--primary-text);font-size:14px}

/* Segmented control (outbound/inbound) */
.seg-ctrl{display:flex;border-radius:20px;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
.seg-item{padding:4px 12px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--secondary-text);border:none;font-family:inherit}
.seg-item.active{background:var(--primary-text);color:#fff}

/* Voice input (Add Scenario step 1) */
.voice-mic-btn{width:72px;height:72px;border-radius:36px;background:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(255,131,112,.35);margin-bottom:24px;border:none;color:#fff;padding:0}
.voice-mic-btn:disabled{opacity:.5;cursor:default}
.voice-textarea{width:100%;padding:12px 14px;background:var(--input-bg);border-radius:12px;border:.5px solid var(--input-stroke);font-size:15px;font-family:inherit;color:var(--primary-text);outline:none;resize:none;min-height:96px;line-height:1.4}
.voice-textarea:focus{border-color:var(--accent)}
.voice-textarea:disabled{opacity:.6}
.voice-cancel{background:transparent;border:none;color:var(--accent);font-size:15px;font-family:inherit;cursor:pointer;padding:4px 8px}

/* ChevPill: inline chip (opens bottom sheet picker) */
.chev-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 4px 2px 8px;background:var(--surface-darken);border-radius:10px;border:.5px solid var(--border);cursor:pointer;font-family:inherit;vertical-align:baseline}
.chev-pill-label{font-size:14px;font-weight:600;color:var(--primary-text)}
.chev-pill-arrow{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:8px;border:.75px solid var(--primary-text);font-size:9px;color:var(--primary-text)}
.picker-scroll{max-height:50vh;overflow-y:auto;padding:0 var(--sm)}
.picker-scroll::-webkit-scrollbar{display:none}

/* Full-screen list picker (matches iOS IndustryPickerSheet NavigationStack + List) */
.done-btn{position:absolute;right:var(--normal);top:10px;background:transparent;border:none;color:var(--accent);font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;padding:4px 8px}
.picker-back-btn{background:transparent;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px;font-family:inherit;display:flex;align-items:center}
.list-container{flex:1;overflow-y:auto;background:var(--bg-primary);padding:var(--normal) 0}
.list-container::-webkit-scrollbar{display:none}
.list-section{background:var(--bg);margin:0 var(--normal) var(--normal);border-radius:var(--r-lg);overflow:hidden;border:.5px solid var(--border)}
.list-section-header{padding:var(--normal) var(--normal) var(--r-sm);font-size:13px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.list-row{padding:14px var(--normal);display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;min-height:var(--cell-h,56px);font-size:17px;color:var(--primary-text);border-bottom:.5px solid var(--border);background:var(--bg)}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--surface-dark)}
.list-row.selected{color:var(--accent)}
.list-row-chevron{color:var(--tertiary-text);font-size:18px;transform:rotate(0deg)}
.list-custom-input{width:100%;padding:14px var(--normal);border:none;background:transparent;outline:none;font-size:17px;color:var(--primary-text);font-family:inherit}
.list-custom-input::placeholder{color:var(--tertiary-text)}

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useRef,useEffect}=React;

// Textarea that auto-grows to fit its content (no fixed rows / trailing whitespace).
function AutoGrowTextarea({value,onChange,className,placeholder}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current){
      ref.current.style.height="auto";
      ref.current.style.height=ref.current.scrollHeight+"px";
    }
  },[value]);
  return(
    <textarea
      ref={ref}
      className={className}
      value={value}
      placeholder={placeholder}
      rows={1}
      onChange={onChange}
    />
  );
}

// ── Industry registry ──
// Each industry declares its own sub-field schema, item labels, business info visibility,
// summary formatting, and (optional) scheduling config. Adding a new industry is a single
// entry in INDUSTRIES — no code branching needed.
const INDUSTRIES={
  residential:{
    id:"residential",
    label:"Residential Agent",
    items_label:"Listing",
    items_label_plural:"Active Listings",
    subfields:[
      {key:"address",label:"Address",type:"text"},
      {key:"property_link",label:"Property Link",type:"url"},
      {key:"property_type",label:"Property Type",type:"text"},
      {key:"bedrooms",label:"Bedrooms",type:"text"},
      {key:"bathrooms",label:"Bathrooms",type:"text"},
      {key:"square_footage",label:"Square Footage",type:"text"},
      {key:"lot_size",label:"Lot Size",type:"text"},
      {key:"year_built",label:"Year Built",type:"text"},
      {key:"list_price",label:"List Price",type:"text"},
      {key:"showing_calendar",label:"Showing Calendar",type:"text"},
      {key:"showing_notes",label:"Showing Notes",type:"multiline"},
    ],
    default_items:[
      {address:"123 Maple Street, Austin, TX 78701",property_link:"https://www.realtor.com/realestateandhomes-detail/123-maple-st",property_type:"Single-family home",bedrooms:"4",bathrooms:"3",square_footage:"2,400 sqft",lot_size:"0.25 acres",year_built:"1998",list_price:"$625,000",showing_calendar:"Mon–Sat 10am–5pm",showing_notes:"Ring doorbell, shoes off, dog in backyard",allow_ai_booking:true,event_duration:30},
      {address:"456 Oak Avenue, Austin, TX 78704",property_link:"https://www.zillow.com/homedetails/456-oak-ave",property_type:"Condo",bedrooms:"2",bathrooms:"2",square_footage:"1,100 sqft",lot_size:"N/A",year_built:"2019",list_price:"$389,000",showing_calendar:"By appointment only",showing_notes:"Tenant-occupied, 24hr notice required",allow_ai_booking:true,event_duration:30},
    ],
    itemTitle:it=>(it.address||"").trim()||"Untitled listing",
    itemSummary:it=>{
      const addr=(it.address||"").trim();
      if(!addr)return"Tap to add details";
      return[it.property_type,it.bedrooms&&`${it.bedrooms} bd`,it.list_price].filter(Boolean).join(" · ");
    },
    business_labels:{geography_served:"Service Areas"},
    business_defaults:{geography_served:"California — statewide"},
    business_draft_keys:["geography_served"],
    scheduling:{
      event_type_label:"Viewing",
      event_type_plural:"viewings",
      duration_unit:"min",
      duration_presets:[15,30,45,60,90],
      duration_default:30,
      allow_ai_booking_default:true,
      location_source_subfield:"address",
      availability_source_subfield:"showing_calendar",
    },
    auto_config_scenarios:[
      {id:"rs1",direction:"outbound",condition:"If buyer's purchase date is in 12 months",instructions:"Text a homeiversary check-in offering a fresh comps / equity update.",auto:false,rel:"buyer",event:"purchase",timing:"in 12 months",action:"text"},
      {id:"rs2",direction:"outbound",condition:"If prospect's listing inquiry is next day",instructions:"Follow up on the listing inquiry with showing availability this week.",auto:true,rel:"prospect",event:"listing inquiry",timing:"next day",action:"text"},
      {id:"rs3",direction:"inbound",condition:"If prospect's call is missed",instructions:"Text back instantly apologizing and asking how you can help.",auto:true,rel:"prospect",event:"missed call",timing:"instantly",action:"text"},
    ],
  },
  medical:{
    id:"medical",
    label:"Medical / Dental",
    items_label:"Service",
    items_label_plural:"Services Offered",
    subfields:[
      {key:"name",label:"Service Name",type:"text"},
      {key:"description",label:"Description",type:"multiline"},
      {key:"price",label:"Price",type:"text"},
      {key:"provider",label:"Provider",type:"text"},
      {key:"clinic_location",label:"Clinic Location",type:"text"},
      {key:"provider_hours",label:"Provider Hours",type:"text"},
    ],

// Full-screen text editor (mirrors EditableTextFieldFullScreen.swift):
// NavigationView-style header with back button + trailing toolbar (Copy / Paste / Clear / Save).
// Back dismisses without saving; only Save commits.
function BusinessFieldEditView({label,initialValue,onSave,onCancel}){
  const [localText,setLocalText]=useState(initialValue||"");
  const taRef=useRef(null);
  useEffect(()=>{taRef.current?.focus()},[]);
  const copy=async()=>{try{await navigator.clipboard.writeText(localText)}catch(e){}};
  const paste=async()=>{try{const t=await navigator.clipboard.readText();if(t)setLocalText(t)}catch(e){}};
  const clear=()=>setLocalText("");
  return(
    <div className="phone">
      <StatusBar/>
      <div className="editable-nav">
        <button className="editable-nav-back" aria-label="Back" onClick={onCancel}>‹</button>
        <div style={{fontSize:17,fontWeight:500,color:"var(--primary-text)"}}>{label}</div>
        <div className="editable-nav-spacer"/>
        <button className="editable-toolbar-btn" onClick={copy} aria-label="Copy">
          <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <rect x="4" y="2" width="10" height="14" rx="1"/>
            <path d="M4 5H3a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1v-1"/>
          </svg>
          <span className="editable-toolbar-label">Copy</span>
        </button>
        <button className="editable-toolbar-btn" onClick={paste} aria-label="Paste">
          <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="4" width="10" height="14" rx="1"/>
            <path d="M6 4V3a1 1 0 011-1h2a1 1 0 011 1v1"/>
          </svg>
          <span className="editable-toolbar-label">Paste</span>
        </button>
        <button className="editable-toolbar-btn" onClick={clear} aria-label="Clear">
          <svg width="16" height="20" viewBox="0 0 16 20" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M2 5h12"/>
            <path d="M4 5v12a1 1 0 001 1h6a1 1 0 001-1V5"/>
            <path d="M6 5V3a1 1 0 011-1h2a1 1 0 011 1v2"/>
          </svg>
          <span className="editable-toolbar-label">Clear</span>
        </button>
        <button className="editable-toolbar-save" onClick={()=>onSave(localText)}>Save</button>
      </div>
      <div className="editable-body">
        {!localText&&<div className="editable-placeholder">{`Enter ${label.toLowerCase()}…`}</div>}
        <textarea
          ref={taRef}
          className="editable-textarea"
          value={localText}
          onChange={e=>setLocalText(e.target.value)}
        />
      </div>
    </div>
  );
}

// ── Duration picker sheet (preset options + custom input) ──
function DurationPickerSheet({value,presets,unit,eventLabel,onPick,onCancel}){
  const [custom,setCustom]=useState(presets.includes(value)?"":String(value));
  const handlePreset=(n)=>{onPick(n)};
  const handleCustom=()=>{
    const n=parseInt(custom,10);
    if(!Number.isNaN(n)&&n>0)onPick(n);
  };
  return(
    <div className="sheet-overlay" onClick={onCancel}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-title">{eventLabel} duration</div>
        <div style={{padding:"0 var(--sm)"}}>
          {presets.map(n=>(
            <div key={n} className={`picker-row ${value===n?"selected":""}`} onClick={()=>handlePreset(n)}>
              <span>{n} {unit}</span>
              {value===n&&<span className="picker-check">✓</span>}
            </div>
          ))}
          <div style={{padding:"12px 0 6px",fontSize:12,color:"var(--secondary-text)"}}>Custom duration ({unit})</div>
          <div style={{display:"flex",gap:8}}>
            <input
              className="picker-custom-input"
              type="number"
              min="1"
              placeholder="e.g. 20"
              value={custom}
              onChange={e=>setCustom(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")handleCustom()}}
            />
            <button className="btn-primary" style={{flex:"initial",width:84}} onClick={handleCustom} disabled={!custom}>Set</button>
          </div>
        </div>
        <div className="sheet-buttons" style={{marginTop:4}}>
          <button className="btn-tertiary" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Products & Services: detail view (Call Transfers bottom-buttons pattern) ──
function ItemDetailView({initialItem,industry,isDraft,onSave,onDelete,onCancel}){
  const itemLabel=industry.items_label;
  const schedulingConfig=industry.scheduling;
  const subfields=industry.subfields;
  const isNew=initialItem===null;
  const [draft,setDraft]=useState(initialItem??emptyItem(industry));
  const [showDiscard,setShowDiscard]=useState(false);
  const [showDelete,setShowDelete]=useState(false);
  const [showDurationPicker,setShowDurationPicker]=useState(false);
  const [showSchedulingInfo,setShowSchedulingInfo]=useState(false);

  const hasChanges=useMemo(()=>{
    const base=initialItem??emptyItem(industry);
    const subfieldChanged=subfields.some(s=>(draft[s.key]||"")!==(base[s.key]||""));
    const schedulingChanged=schedulingConfig&&(
      (draft.allow_ai_booking!==base.allow_ai_booking)||
      (draft.event_duration!==base.event_duration)
    );
    return subfieldChanged||schedulingChanged;
  },[draft,initialItem,industry]);

  const tryDismiss=()=>{
    if(hasChanges)setShowDiscard(true);
    else onCancel();
  };

  const updateField=(k,v)=>setDraft(prev=>({...prev,[k]:v}));
  const title=isNew?`Add ${itemLabel.toLowerCase()}`:`Edit ${itemLabel.toLowerCase()}`;

  return(
    <div className="phone">
      <StatusBar/>
      <div className="nav-header">
        <div className="nav-title">{title}</div>
        <button className="dismiss-btn" aria-label="Close" onClick={tryDismiss}>×</button>
      </div>
      <div className="screen-content">
        {isDraft&&(
          <div style={{padding:"4px 16px 0"}}>
            <span className="tag-draft">Draft</span>
          </div>
        )}
        <div style={{height:8}}/>
        <div className="card">
          {subfields.map((spec,i)=>{
            const val=draft[spec.key]||"";
            return(
              <React.Fragment key={spec.key}>
                <div className="row">
                  <div className="row-label">{spec.label}</div>
                  {spec.type==="multiline"?(
                    <AutoGrowTextarea
                      className="inline-input"
                      value={val}
                      placeholder={spec.placeholder||""}
                      onChange={e=>updateField(spec.key,e.target.value)}
                    />
                  ):(
                    <input
                      className="inline-input"
                      type={spec.type==="url"?"url":"text"}
                      value={val}
                      placeholder={spec.placeholder||""}
                      onChange={e=>updateField(spec.key,e.target.value)}
                    />
                  )}
                </div>
                {i<subfields.length-1&&<div className="row-divider"/>}
              </React.Fragment>
            );
          })}
        </div>

        {schedulingConfig&&(
          <>
            <div className="section-header">
              AI Scheduling
              <button className="section-info" aria-label="About AI Scheduling" onClick={()=>setShowSchedulingInfo(true)}>ⓘ</button>
            </div>
            <div className="card">
              <div className="settings-row">
                <div className="settings-row-label">Allow AI to book {schedulingConfig.event_type_plural}</div>
                <Toggle on={!!draft.allow_ai_booking} onChange={v=>updateField("allow_ai_booking",v)}/>
              </div>
              <div className="row-divider"/>
              <div className="settings-row" onClick={()=>setShowDurationPicker(true)} style={{cursor:"pointer"}}>
                <div className="settings-row-label">{schedulingConfig.event_type_label} duration</div>
                <div className="settings-row-trailing">
                  <span>{draft.event_duration||schedulingConfig.duration_default} {schedulingConfig.duration_unit}</span>
                  <span className="chevron">›</span>
                </div>
              </div>
            </div>
          </>
        )}
      </div>

// ── ChevPill: inline chip that opens a bottom sheet picker ──
// If the current value isn't in the static option list (e.g. a legacy industry pre-fill), we inject
// it at the top of the list so it remains selectable afterward.
function ChevPill({options,value,onChange,sheetTitle}){
  const [open,setOpen]=useState(false);
  const mergedOptions=useMemo(()=>(
    !value||options.includes(value)?options:[value,...options]
  ),[options,value]);
  return(
    <>
      <span className="chev-pill" onClick={(e)=>{e.stopPropagation();setOpen(true)}}>
        <span className="chev-pill-label">{value}</span>
        <span className="chev-pill-arrow">▾</span>
      </span>
      {open&&(
        <OptionPickerSheet
          title={sheetTitle||"Choose an option"}
          options={mergedOptions}
          value={value}
          onPick={(opt)=>{onChange(opt);setOpen(false)}}
          onCancel={()=>setOpen(false)}
        />
      )}
    </>
  );
}

// Industry-aware "parsed" scenario — fakes what the AI would extract from a natural-language description.
const VOICE_EXAMPLE_BY_INDUSTRY={
  residential:"When a buyer hits their 12-month purchase anniversary, text them a homeiversary equity check-in",
  medical:"When a patient hasn't visited in 90 days, text a preventive care check-in",
  equipment_rental:"When a client's rental ends in 2 days, text them to confirm extension or pickup",
  pharmacy:"When a patient is about to run out of meds, text a refill reminder two days before",
};

const PARSED_SCENARIO_BY_INDUSTRY={
  residential:{rel:"buyer",event:"purchase",timing:"in 12 months",action:"text",auto:false},
  medical:{rel:"patient",event:"appointment",timing:"in 90 days",action:"text",auto:false},
  equipment_rental:{rel:"client",event:"purchase",timing:"in 2 days",action:"text",auto:false},
  pharmacy:{rel:"patient",event:"purchase",timing:"in 2 days",action:"text",auto:true},
};

function parseVoiceToScenario(industry){
  const override=PARSED_SCENARIO_BY_INDUSTRY[industry.id]||{};
  const base={...emptyScenario(),direction:"outbound",...override};
  return{...base,condition:buildCondition(base),instructions:buildInstructions(base)};
}

function VoiceInputView({industry,onCancel,onDone}){

    setVoiceText(example);

  const onKeyDown=(e)=>{

            <rect x="9" y="1" width="6" height="12" rx="3"/>

            <path d="M12 19v4"/>
          </svg>

// ── Scenario edit view (mirrors ItemDetailView pattern: Save / Edit / Delete with confirmation sheets) ──
function ScenarioEditView({initialScenario,isNew,onSave,onDelete,onCancel}){
  const [draft,setDraft]=useState(initialScenario??emptyScenario());
  const [showDiscard,setShowDiscard]=useState(false);
  const [showDelete,setShowDelete]=useState(false);

  const hasChanges=useMemo(()=>{
    const base=initialScenario??emptyScenario();
    return ["direction","rel","event","timing","action","auto"].some(k=>draft[k]!==base[k]);
  },[draft,initialScenario]);

  const isInbound=draft.direction==="inbound";
  const updateField=(k,v)=>setDraft(prev=>{
    const next={...prev,[k]:v};
    // Recompute condition/instructions summary on each structural change so the list view stays fresh.
    next.condition=buildCondition(next);
    next.instructions=buildInstructions(next);
    return next;
  });

  const tryDismiss=()=>{
    if(hasChanges)setShowDiscard(true);
    else onCancel();
  };
  const title=isNew?"Add scenario":"Edit scenario";

  return(
    <div className="phone">
      <StatusBar/>
      <div className="nav-header">
        <div className="nav-title">{title}</div>
        <button className="dismiss-btn" aria-label="Close" onClick={tryDismiss}>×</button>
      </div>
      <div className="screen-content">
        <div style={{height:8}}/>
        <div className="card">
          <div className="settings-row">
            <div className="settings-row-label">Direction</div>
            <div className="seg-ctrl">
              <button className={`seg-item ${!isInbound?"active":""}`} onClick={()=>updateField("direction","outbound")}>Outbound</button>
              <button className={`seg-item ${isInbound?"active":""}`} onClick={()=>updateField("direction","inbound")}>Inbound</button>
            </div>
          </div>
          <div className="row-divider"/>
          <div className="row">
            <div className="row-label">{isInbound?"Condition":"Outbound condition"}</div>
            <div style={{fontSize:15,color:"var(--primary-text)",lineHeight:1.8,paddingTop:4}}>
              {isInbound?(
                <>
                  If <ChevPill sheetTitle="Caller type" options={SCENARIO_REL_OPTIONS} value={draft.rel} onChange={v=>updateField("rel",v)}/>'s call is missed
                </>
              ):(
                <>
                  If <ChevPill sheetTitle="Caller type" options={SCENARIO_REL_OPTIONS} value={draft.rel} onChange={v=>updateField("rel",v)}/>'s{" "}
                  <ChevPill sheetTitle="Event" options={SCENARIO_EVENT_OPTIONS} value={draft.event} onChange={v=>updateField("event",v)}/> date is{" "}
                  <ChevPill sheetTitle="Timing" options={SCENARIO_TIMING_OPTIONS} value={draft.timing} onChange={v=>updateField("timing",v)}/>
                </>
              )}
            </div>
          </div>
          <div className="row-divider"/>
          <div className="row">
            <div className="row-label">{isInbound?"Action":"Outbound action"}</div>
            <div style={{fontSize:15,color:"var(--primary-text)",lineHeight:1.8,paddingTop:4}}>
              <ChevPill sheetTitle="Action" options={SCENARIO_ACTION_OPTIONS} value={draft.action} onChange={v=>updateField("action",v)}/>{" "}
              {isInbound?"back apologizing and asking how you can help":`a ${draft.event} ${draft.action==="call"?"check-in":"reminder"}`}
            </div>
          </div>
          <div className="row-divider"/>
          <div className="settings-row">
            <div className="settings-row-label">Automatic</div>
            <Toggle on={!!draft.auto} onChange={v=>updateField("auto",v)}/>
          </div>
        </div>
      </div>
      <div className="detail-bottom">
        {isNew?(
          <button className="btn-primary" onClick={()=>onSave(draft)}>Save scenario</button>
        ):(
          <>
            <button className="btn-destructive" onClick={()=>setShowDelete(true)}>Delete</button>
            <button className="btn-tertiary" onClick={()=>onSave(draft)}>Edit scenario</button>
          </>
        )}
      </div>
      {showDiscard&&(
        <ConfirmSheet
          title="Unsaved changes"
          description={isNew?"Tap Save to keep your scenario.":"Tap Edit to save your changes."}
          confirmLabel="Discard"
          onConfirm={()=>{setShowDiscard(false);onCancel()}}
          onCancel={()=>setShowDiscard(false)}
          icon="🗑"
        />
      )}
      {showDelete&&(
        <ConfirmSheet
          title="Delete scenario?"
          description="This scenario will be permanently removed."
          confirmLabel="Delete"
          onConfirm={()=>{setShowDelete(false);onDelete()}}
          onCancel={()=>setShowDelete(false)}
          icon="🗑"
        />
      )}
    </div>
  );
}

function buildCondition(sc){
  if(sc.direction==="inbound")return `If ${sc.rel}'s call is missed`;
  return `If ${sc.rel}'s ${sc.event} date is ${sc.timing}`;
}
function buildInstructions(sc){
  if(sc.direction==="inbound")return "Text back instantly apologizing and asking how you can help.";
  const verb=sc.action==="call"?"Make an AI call":"Text";
  const suffix=sc.action==="call"?"check-in":"reminder";
  return `${verb} a ${sc.event} ${suffix}.`;
}

      <div style={{textAlign:"center",padding:"8px 0 0"}}>
        <div style={{fontSize:20,fontWeight:700,color:"#fff",letterSpacing:"-.5px"}}>YouSquared</div>
        <div style={{fontSize:12,color:"#888",marginTop:2}}>Industry auto-config prototype</div>
      </div>
      <div className="nav-bar">
        {pageKeys.map(k=>(
          <button key={k} className={`nav-btn ${page===k?"active":""}`} onClick={()=>setPage(k)}>
            {PAGES[k].label}
          </button>
        ))}
      </div>
      {current.render({industry,onChangeIndustry:setIndustryId,scenarios,setScenarios})}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
