<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>YouSquared — Stats v2 (iOS Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --accent:#FF8370;
  --accent-dark:#E07A5F;
  --primary-text:#2D2A26;
  --secondary-text:#6B6560;
  --tertiary-text:#9E9893;
  --bg:#FFFFFF;
  --bg-warm:#F5F2EF;
  --surface-light:#FBF9F7;
  --surface-dark:#F8F6F4;
  --surface-darken:#F0EDEA;
  --surface-black:#2D2A26;
  --border:#E8E4E0;
  --error:#E53935;
  --success:#43A047;
  --warning:#F57C00;
  --warning-soft:#FFF4E6;
  --info:#42A5F5;
}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html,body{margin:0;padding:0;background:#1a1a1a;font-family:'Inter',-apple-system,system-ui,sans-serif;color:#eee;min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}
.serif{font-family:'Lora',Georgia,serif}

/* Persona navigator — single row */
.nav-row{display:flex;gap:10px;margin-bottom:22px;justify-content:center;flex-wrap:wrap}
.nav-row button{font:inherit;font-size:14px;font-weight:600;padding:10px 18px;border-radius:30px;border:1px solid #333;background:#222;color:#ccc;cursor:pointer;transition:all .2s}
.nav-row button:hover{border-color:var(--accent);color:#fff}
.nav-row button.active{background:linear-gradient(135deg,#FFB7A6,#FF8370);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(255,131,112,.35)}

/* Phone frame */
.phone{
  width:393px;height:852px;
  background:var(--bg);
  border-radius:44px;
  border:10px solid #0a0a0a;
  box-shadow:0 30px 80px rgba(0,0,0,.6),0 10px 30px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
  color:var(--primary-text);
}
/* White fade behind floating tab bar — blends scrolled content into white */
.phone::after{
  content:"";
  position:absolute;left:0;right:0;bottom:0;
  height:120px;
  background:linear-gradient(to bottom,rgba(255,255,255,0) 0%,rgba(255,255,255,.92) 50%,#fff 80%);
  pointer-events:none;
  z-index:5;
}
.statusbar{height:54px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 8px;font-size:15px;font-weight:600;color:var(--primary-text);position:relative;z-index:5;flex-shrink:0}
.statusbar .notch{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:120px;height:34px;background:#0a0a0a;border-radius:20px}
.statusbar .icons{display:flex;gap:5px;align-items:center}
.statusbar .icons svg{display:block}

/* Screen layout */
.screen{position:absolute;inset:0;display:flex;flex-direction:column}
.body{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 0 130px}
.body::-webkit-scrollbar{width:0}

/* Header: title only */
.page-head{padding:6px 20px 10px}
.page-title{font-size:26px;font-weight:600;color:var(--primary-text);font-family:'Lora',serif;letter-spacing:-.3px;line-height:1.15}

/* Section — generous breathing room by default, tight for above-fold */
.section{margin:28px 16px}
.section.tight{margin:14px 16px}
.section-title{font-size:11px;font-weight:600;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.9px;margin:0 4px 10px;display:flex;justify-content:space-between;align-items:center}
.section-title .more{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:0;text-transform:none;cursor:pointer}
.card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:18px;padding:18px}

/* ============================================================
 *  HERO CARD — the only dark gradient on the page
 * ============================================================ */
.hero-wrap{margin:4px 16px 18px;position:relative}
.hero{
  background:linear-gradient(145deg,#2D2A26 0%,#433F3A 55%,#3A3632 100%);
  border-radius:22px;
  padding:18px 22px 16px;
  color:#fff;
  position:relative;overflow:hidden;
  cursor:pointer;
}
.hero::before{content:"";position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.35) 0%,rgba(255,131,112,0) 70%);top:-90px;right:-90px;pointer-events:none}
.hero::after{content:"";position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,131,112,.18) 0%,rgba(255,131,112,0) 70%);bottom:-70px;left:-50px;pointer-events:none}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;gap:12px}
.hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#FFB7A6}
.hero-share{display:inline-flex;align-items:center;gap:5px;padding:6px 13px 6px 10px;border-radius:30px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.hero-share svg{stroke:var(--accent)}
.hero-num{font-family:'Lora',serif;font-size:42px;font-weight:600;line-height:1.05;margin:2px 0 3px;letter-spacing:-1px;position:relative}
.hero-sub{font-size:12px;color:#D8D2CB;position:relative;margin-bottom:6px;font-weight:500}
.cum-chart{position:relative;width:100%;height:44px;margin:2px 0 6px;display:block}
.hero-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;flex-wrap:wrap}
.hero-delta{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:30px;font-weight:600;font-size:11px;font-family:inherit;border:none}
.hero-delta.up{background:rgba(67,160,71,.22);color:#7BD789}
.hero-delta.down{background:rgba(245,124,0,.3);color:#FFB968}
.hero-tap{font-size:11px;color:#FFB7A6;font-weight:600;display:inline-flex;align-items:center;gap:3px}

/* Activation stepper (cold start hero internals) */
.cold-stepper{position:relative;margin-top:10px}
.cold-title{font-family:'Lora',serif;font-size:22px;line-height:1.25;font-weight:600;margin:8px 0 10px;position:relative;color:#fff;letter-spacing:-.3px}
.cold-step{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:0.5px solid rgba(255,255,255,.14)}
.cold-step:last-child{border-bottom:0.5px solid rgba(255,255,255,.14)}
.cold-num{width:26px;height:26px;border-radius:50%;background:rgba(255,131,112,.22);border:1px solid rgba(255,131,112,.55);color:#FFB7A6;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Lora',serif}
.cold-step-label{flex:1;font-size:13px;color:#fff;font-weight:500}
.cold-step-chev{color:#B8B0A6;flex-shrink:0}

/* ============================================================
 *  KPI RINGS — faded green when full, faded orange otherwise
 *  Track is always warm faded taupe.
 * ============================================================ */
.rings-row{display:flex;justify-content:space-around;align-items:flex-start;padding:10px 8px 14px;gap:6px;border-bottom:0.5px solid var(--border)}
.ring-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:8px 6px;border-radius:14px;flex:1;transition:background .15s}
.ring-item:hover{background:var(--surface-dark)}
.ring-outer{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center}
.ring-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9E9486}
.ring-item.low .ring-icon{color:#B08560}
.ring-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--secondary-text);font-weight:600;margin-top:8px}
.ring-item.low .ring-label{color:#A6795A}
.ring-value{font-family:'Lora',serif;font-size:17px;font-weight:600;color:var(--primary-text);line-height:1;margin-top:3px;letter-spacing:-.2px}
.ring-item.low .ring-value{color:#A6795A}
.ring-sub{font-size:10px;color:var(--tertiary-text);margin-top:2px;font-weight:500}
.ring-item.low .ring-sub{color:#A6795A}

/* Communication toggle */
.comm-toggle{display:flex;gap:4px;background:var(--surface-darken);border-radius:30px;padding:3px;font-size:11px;font-weight:600}
.comm-toggle button{border:none;background:none;padding:5px 12px;border-radius:30px;color:var(--secondary-text);cursor:pointer;font:inherit}
.comm-toggle button.active{background:#fff;color:var(--primary-text);box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Unhappy expand → reason + calls */
.sat-unhappy-wrap{padding:8px 0 0 20px}
.sat-reason-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--secondary-text);margin:8px 0 6px;display:flex;align-items:center;gap:6px}
.sat-reason-head::before{content:"";width:6px;height:6px;border-radius:50%;background:#E53935}
.sat-unhappy-call{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-warm);border-radius:10px;margin-bottom:6px;cursor:pointer}
.sat-unhappy-call .avatar{width:30px;height:30px;font-size:11px}
.sat-unhappy-info{flex:1;min-width:0}
.sat-unhappy-name{font-size:12px;font-weight:600;color:var(--primary-text)}
.sat-unhappy-sum{font-size:11px;color:var(--secondary-text);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sat-unhappy-arrow{color:var(--tertiary-text);flex-shrink:0}

/* Contact thread modal */
.thread-overlay{position:absolute;inset:0;background:rgba(0,0,0,.48);z-index:30;display:flex;flex-direction:column;justify-content:flex-end;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.thread-sheet{background:var(--bg);border-radius:28px 28px 0 0;padding:12px 0 28px;max-height:82%;overflow-y:auto;animation:slideUp .32s cubic-bezier(.2,.8,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.thread-handle{width:36px;height:5px;background:#D8D4D0;border-radius:30px;margin:0 auto 14px}
.thread-head{padding:2px 22px 14px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border)}
.thread-head .avatar{width:44px;height:44px;font-size:14px}
.thread-head-info{flex:1;min-width:0}
.thread-head-name{font-size:17px;font-weight:700;color:var(--primary-text)}
.thread-head-sub{font-size:12px;color:var(--secondary-text);margin-top:2px}
.thread-close{width:32px;height:32px;border-radius:50%;background:var(--surface-darken);display:flex;align-items:center;justify-content:center;color:var(--secondary-text);cursor:pointer;border:none;font-size:16px;flex-shrink:0}
.thread-body{padding:14px 22px}
.thread-call-card{background:var(--surface-dark);border:0.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.thread-call-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.thread-call-icon{width:32px;height:32px;border-radius:50%;background:rgba(229,57,53,.12);color:#E53935;display:flex;align-items:center;justify-content:center}
.thread-call-title{flex:1;font-size:13px;font-weight:600;color:var(--primary-text)}
.thread-call-time{font-size:11px;color:var(--tertiary-text)}
.thread-transcript{background:var(--bg-warm);border-radius:10px;padding:12px;font-size:12px;line-height:1.55;color:var(--secondary-text);white-space:pre-line}
.thread-actions{display:flex;gap:8px;margin-top:12px}
.thread-action{flex:1;padding:10px;background:var(--surface-dark);border:0.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:600;color:var(--primary-text);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}

/* Share modal (bottom sheet) */
.share-title{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);padding:0 22px 6px;letter-spacing:-.3px}
.share-sub{font-size:12px;color:var(--secondary-text);padding:0 22px 18px;line-height:1.5}
.share-option{display:flex;align-items:center;gap:14px;padding:14px 22px;cursor:pointer;transition:background .12s}
.share-option:hover{background:var(--surface-dark)}
.share-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.share-icon.bosses{background:rgba(200,160,149,.18);color:#A67C6E}
.share-icon.colleagues{background:rgba(126,156,200,.16);color:#5C7DA8}
.share-icon.social{background:rgba(255,131,112,.14);color:var(--accent-dark)}
.share-option-info{flex:1;min-width:0}
.share-option-title{font-size:15px;font-weight:600;color:var(--primary-text)}
.share-option-sub{font-size:12px;color:var(--secondary-text);margin-top:2px}
.share-option-chev{color:var(--tertiary-text)}

/* ============================================================
 *  HIGHLIGHT — flat (no card), inline header with toggle
 * ============================================================ */
.hl-flat{padding:0 4px}
.hl-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.hl-header-label{font-size:11px;font-weight:600;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.9px;margin-right:2px}
.hl-pill{font:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:30px;background:var(--surface-darken);color:var(--secondary-text);border:none;cursor:pointer}
.hl-pill.active{background:#9A9088;color:#fff}
.hl-name{font-size:16px;font-weight:600;color:var(--primary-text);line-height:1.3;margin-bottom:4px}
.hl-sum{font-size:13px;color:var(--secondary-text);line-height:1.5;min-height:38px;margin-bottom:10px}
.hl-foot{display:flex;align-items:center;gap:12px}
.hl-play{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;box-shadow:0 3px 14px rgba(255,131,112,.4);cursor:pointer}
.hl-play svg{margin-left:2px}
.wave{flex:1;display:flex;align-items:center;gap:2px;height:30px}
.wave .bar{width:2.5px;background:var(--accent);border-radius:1.5px;opacity:.45}
.wave .bar.played{opacity:1}
.hl-meta{font-size:11px;color:var(--tertiary-text);font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums;flex-shrink:0}
.hl-share{display:inline-flex;align-items:center;gap:4px;padding:5px 11px 5px 9px;border-radius:30px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.hl-share svg{stroke:var(--accent)}

/* Empty highlight (cold start) */
.hl-empty{background:var(--surface-dark);border:0.5px dashed var(--border);border-radius:16px;padding:20px;text-align:center;cursor:pointer}
.hl-empty-title{font-size:13px;font-weight:600;color:var(--primary-text);margin-bottom:4px}
.hl-empty-sub{font-size:12px;color:var(--secondary-text);line-height:1.4}

/* ============================================================
 *  DIAGNOSIS banner (orange-mid only, sits where you scroll to)
 * ============================================================ */
.diagnosis{background:var(--warning-soft);border:0.5px solid rgba(245,124,0,.35);border-radius:16px;padding:14px 16px}
.diagnosis-title{font-size:13px;font-weight:700;color:#8A4A0A;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.diagnosis-body{font-size:12px;color:#8A4A0A;line-height:1.5;margin-bottom:10px}
.diagnosis-cta{font-size:12px;font-weight:600;color:#fff;background:var(--warning);padding:8px 14px;border-radius:30px;border:none;font-family:inherit;cursor:pointer}

/* ============================================================
 *  COMMUNICATION stacked bars + missed dashed line
 * ============================================================ */
.comm-grid{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:150px;padding:8px 0 0;position:relative}
.comm-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;gap:6px;min-width:0;position:relative;z-index:1}
.comm-stack{width:100%;max-width:34px;display:flex;flex-direction:column-reverse;border-radius:4px 4px 2px 2px;overflow:hidden;min-height:6px;position:relative}
.comm-seg{width:100%}
.comm-seg.calls{background:linear-gradient(180deg,var(--accent),var(--accent-dark))}
.comm-seg.voicemails{background:linear-gradient(180deg,#FFB7A6,#FF9680)}
.comm-seg.texts{background:linear-gradient(180deg,#FFD4C4,#FFC0A8)}
.comm-col.past .comm-seg.calls{background:linear-gradient(180deg,rgba(255,131,112,.45),rgba(224,122,95,.5))}
.comm-col.past .comm-seg.voicemails{background:linear-gradient(180deg,rgba(255,183,166,.45),rgba(255,150,128,.5))}
.comm-col.past .comm-seg.texts{background:linear-gradient(180deg,rgba(255,212,196,.4),rgba(255,192,168,.45))}
.comm-label{font-size:9px;color:var(--tertiary-text);font-weight:500;text-align:center;white-space:nowrap}
.comm-val{font-size:11px;color:var(--secondary-text);font-weight:600}
.comm-legend{display:flex;gap:13px;font-size:10px;color:var(--secondary-text);margin-top:14px;padding-top:12px;border-top:0.5px solid var(--border);flex-wrap:wrap}
.comm-leg{display:flex;align-items:center;gap:5px}
.comm-leg .dot{width:8px;height:8px;border-radius:2px}
.missed-line-label{display:flex;align-items:center;gap:5px}
.missed-line-label::before{content:"";width:12px;height:0;border-top:1.5px dashed #E53935;border-radius:1px}

/* ============================================================
 *  Donut (captured vs missed)
 * ============================================================ */
.split{display:flex;gap:12px;align-items:center}
.donut{position:relative;width:96px;height:96px;flex-shrink:0}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-pct{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--primary-text);line-height:1}
.donut-label{font-size:9px;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.split-stats{flex:1;display:flex;flex-direction:column;gap:8px}
.split-stat{display:flex;align-items:center;gap:8px;font-size:12px}
.split-dot{width:10px;height:10px;border-radius:3px}
.split-stat .v{margin-left:auto;font-weight:600;color:var(--primary-text);font-family:'Lora',serif;font-size:14px}

/* ============================================================
 *  Satisfaction — distribution + expandable categories
 * ============================================================ */
.sat-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;gap:2px;margin-bottom:14px;background:var(--surface-darken)}
.sat-seg{height:100%}
.sat-seg:first-child{border-radius:7px 0 0 7px}
.sat-seg:last-child{border-radius:0 7px 7px 0}
.sat-cat{padding:11px 0;border-top:0.5px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px}
.sat-cat:last-of-type{border-bottom:0.5px solid var(--border)}
.sat-cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sat-cat-name{flex:1;font-size:13px;font-weight:600;color:var(--primary-text)}
.sat-cat-val{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--primary-text);font-variant-numeric:tabular-nums}
.sat-cat-chev{color:var(--tertiary-text);transition:transform .2s;flex-shrink:0}
.sat-cat-chev.open{transform:rotate(90deg)}
.sat-reason{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg-warm);border-radius:10px;margin:6px 0 6px 20px}
.sat-reason-label{flex:1;font-size:12px;color:var(--primary-text)}
.sat-reason-count{font-size:10px;color:var(--secondary-text);font-weight:600}
.sat-note{background:rgba(126,156,200,.1);border-left:3px solid #7E9CC8;padding:10px 12px;border-radius:0 10px 10px 0;font-size:11px;color:var(--secondary-text);line-height:1.5;margin-bottom:14px}
.sat-fix{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--warning-soft);border:0.5px solid rgba(245,124,0,.3);border-radius:12px;margin-bottom:8px;cursor:pointer}
.sat-fix-body{flex:1}
.sat-fix-title{font-size:12px;font-weight:600;color:#8A4A0A}
.sat-fix-sub{font-size:11px;color:#8A4A0A;margin-top:1px;opacity:.85}

/* ============================================================
 *  Filter pills (for merged Recent calls)
 * ============================================================ */
.filter-row{display:flex;gap:8px;margin-bottom:12px;padding:0 4px}
.filter-pill{font:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:30px;background:var(--surface-darken);color:var(--primary-text);border:none;cursor:pointer}
.filter-pill.active{background:var(--accent);color:#fff}

/* Flat section header (no card wrapper) */
.flat-list{padding:0 16px}
.flat-header{font-size:11px;font-weight:600;color:var(--secondary-text);text-transform:uppercase;letter-spacing:.9px;margin:0 4px 4px;display:flex;justify-content:space-between;align-items:center}
.flat-header .more{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:0;text-transform:none;cursor:pointer}

/* ============================================================
 *  Team rows (flat, no card)
 * ============================================================ */
.team-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-top:0.5px solid var(--border)}
.team-row:last-of-type{border-bottom:0.5px solid var(--border)}
.team-info{flex:1;min-width:0}

function makeCumSeries(count, shape){
  const final = 100;
  const pts=[];
  for(let i=0;i<count;i++){
    const t = i/(count-1);
    let v;
    if(shape==="up"){ v = final * Math.pow(t,1.6); }
    else if(shape==="slowing"){
      const ease = 1 - Math.pow(1-t,1.8);
      const flat = i>=count-3 ? 0.97 : 1;
      v = final * ease * flat;
    } else { v = final * t; }
    pts.push(v);
  }
  return pts;
}

/* Cumulative area chart inside hero */
const CumChart = ({series, down=false}) => {
  if(!series || !series.length) return null;
  const w=340, h=56, pad=2;
  const max = Math.max(...series,1);
  const sx = i => pad + (i/(series.length-1))*(w-pad*2);
  const sy = v => h - pad - (v/max)*(h-pad*2);
  const path = series.map((v,i)=>`${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(v).toFixed(1)}`).join(" ");
  const area = path + ` L${sx(series.length-1).toFixed(1)},${h} L${sx(0).toFixed(1)},${h} Z`;
  const stroke = down ? "#FFB968" : "#FFB7A6";
  return (
    <svg className="cum-chart" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id="cg" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0" stopColor={stroke} stopOpacity=".55"/>
          <stop offset="1" stopColor={stroke} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#cg)"/>
      <path d={path} fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

const Donut = ({pct=84}) => {
  const r=38, c=2*Math.PI*r;
  const dash = (pct/100)*c;
  return (
    <div className="donut">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r={r} fill="none" stroke="#F0EDEA" strokeWidth="10"/>
        <circle cx="48" cy="48" r={r} fill="none" stroke="url(#dg)" strokeWidth="10" strokeDasharray={`${dash} ${c}`} strokeLinecap="round" transform="rotate(-90 48 48)"/>
        <defs>
          <linearGradient id="dg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stopColor="#FF8370"/>
            <stop offset="1" stopColor="#E07A5F"/>
          </linearGradient>
        </defs>
      </svg>
      <div className="donut-center"><div className="donut-pct">{pct}%</div><div className="donut-label">Captured</div></div>
    </div>
  );
};

/* Stacked comm chart with missed line overlay */
const CommChart = ({cycles}) => {
  if(!cycles) return null;
  const max = Math.max(...cycles.map(c=>c.calls+c.voicemails+c.texts));
  const w=340, h=134;
  const cx = i => 20 + (i/(cycles.length-1))*(w-40);
  const cy = m => h - (m/max)*h;
  const missedPath = cycles.map((c,i)=>`${i===0?"M":"L"}${cx(i).toFixed(1)},${cy(c.missed).toFixed(1)}`).join(" ");
  return (
    <div>
      <div className="comm-grid">
        {cycles.map((c,i)=>{
          const total = c.calls+c.voicemails+c.texts;
          const stackH = (total/max)*100;
          return (
            <div className={"comm-col"+(c.past?" past":"")} key={i}>
              <div className="comm-val">{total}</div>
              <div className="comm-stack" style={{height:`${stackH}%`}}>
                {c.calls>0 && <div className="comm-seg calls" style={{flex:c.calls}}></div>}
                {c.voicemails>0 && <div className="comm-seg voicemails" style={{flex:c.voicemails}}></div>}
                {c.texts>0 && <div className="comm-seg texts" style={{flex:c.texts}}></div>}
              </div>
              <div className="comm-label">{c.label}</div>
            </div>
          );
        })}
        <svg style={{position:"absolute",left:0,right:0,top:22,height:134,width:"100%",pointerEvents:"none"}} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
          <path d={missedPath} fill="none" stroke="#E53935" strokeWidth="1.6" strokeDasharray="3 3" opacity=".7"/>
        </svg>
      </div>
      <div className="comm-legend">
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FF8370,#E07A5F)"}}></span>Calls</div>
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FFB7A6,#FF9680)"}}></span>Voicemails</div>
        <div className="comm-leg"><span className="dot" style={{background:"linear-gradient(180deg,#FFD4C4,#FFC0A8)"}}></span>Texts</div>
        <div className="comm-leg missed-line-label">missed</div>
      </div>
    </div>
  );
};

/* Ring palette — faded green when full, faded orange otherwise, taupe track always */
const TRACK_COLOR = "#D8CDBF";   // warm faded taupe
const FULL_COLOR  = "#B0C7AD";   // faded muted sage
const LOW_COLOR   = "#D4A580";   // faded dusty terracotta
const FULL_THRESHOLD = 80;

const Ring = ({pct, low}) => {
  const r=38, c=2*Math.PI*r;
  const dash = (pct/100)*c;
  const ring = low ? LOW_COLOR : FULL_COLOR;
  return (
    <svg width="84" height="84" viewBox="0 0 84 84">
      <circle cx="42" cy="42" r={r} fill="none" stroke={TRACK_COLOR} strokeWidth="9"/>
      <circle cx="42" cy="42" r={r} fill="none" stroke={ring} strokeWidth="9" strokeDasharray={`${dash} ${c}`} strokeLinecap="round" transform="rotate(-90 42 42)"/>
    </svg>
  );
};

const RingKPI = ({kpi, label, icon, onTap}) => {
  const low = (kpi.pct || 0) < FULL_THRESHOLD;
  return (
    <div className={"ring-item"+(low?" low":"")} onClick={onTap}>
      <div className="ring-outer">
        <Ring pct={kpi.pct || 0} low={low}/>
        <div className="ring-icon">{icon}</div>
      </div>
      <div className="ring-label">{label}</div>
      <div className="ring-value">{kpi.value}</div>
      <div className="ring-sub">{kpi.sub}</div>
    </div>
  );
};
